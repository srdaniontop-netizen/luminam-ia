<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Tutor IA | Luminom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0A1628;
      --navy-mid: #112240;
      --navy-light: #1C3461;
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --white: #FFFFFF;
      --border-gold: rgba(201,168,76,0.3);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: var(--font-body);
      background: var(--navy);
      color: var(--white);
      display: flex;
      flex-direction: column;
    }
    
    /* === TOPBAR === */
    .topbar {
      height: 60px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      flex-shrink: 0;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    
    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--gold);
      color: var(--navy);

      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
    }
    
    .logo-text {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
    }
    
    .logo-text em {
      font-style: italic;
      color: var(--gold);
    }
    
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .user-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
    }
    
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.55);
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .btn-logout:hover {
      border-color: rgba(255,255,255,0.4);
      color: var(--white);
    }
    
    .btn-home {
      color: rgba(255,255,255,0.45);
      font-size: 0.8rem;
      transition: var(--transition);
      text-decoration: none;
    }
    
    .btn-home:hover {
      color: var(--gold);
    }

    
    /* === LAYOUT === */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    /* === SIDEBAR === */
    .sidebar {
      width: 280px;
      background: rgba(0,0,0,0.22);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    
    .sidebar::-webkit-scrollbar {
      width: 4px;
    }
    
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }
    
    .sidebar-section {
      padding: 1.25rem 1.1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    
    .sidebar-section:last-child {
      border-bottom: none;
    }
    
    .sidebar-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    
    .profile-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .avatar {
      width: 42px;
      height: 42px;
      background: var(--gold);
      color: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    
    .profile-name {
      font-weight: 600;
      font-size: 0.88rem;
    }
    
    .profile-carrera {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      margin-top: 0.1rem;
    }
    
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.5rem;
    }
    
    .tag {
      font-size: 0.68rem;
      background: rgba(201,168,76,0.1);
      border: 1px solid var(--border-gold);
      color: #E8C97A;
      padding: 0.22rem 0.6rem;
      border-radius: 100px;
    }
    
    .stats-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    
    .stat-box {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.5rem;
      text-align: center;
    }
    
    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
    }
    
    .stat-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.45);
      margin-top: 0.2rem;
    }
    
    .new-chat-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--border-gold);
      color: var(--gold-light);
      padding: 0.65rem;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    
    .new-chat-btn:hover {
      background: rgba(201,168,76,0.22);
    }
    
    .quick-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    
    .qbtn {
      text-align: left;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.65);
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      font-size: 0.76rem;
      cursor: pointer;
      transition: var(--transition);
      line-height: 1.4;
    }
    
    .qbtn:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--border-gold);
      color: #E8C97A;
    }
    
    .history-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 0.6rem;
      border-radius: 8px;
      font-size: 0.76rem;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 0.4rem;
    }
    
    .history-item:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--border-gold);
    }
    
    /* === CHAT AREA === */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    
    .ch-avatar {
      width: 36px;
      height: 36px;
      background: var(--gold);
      color: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
    }

    
    .ch-name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .ch-status {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.42);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    
    .ch-dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
    }
    
    /* === MESSAGES === */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    
    .messages::-webkit-scrollbar {
      width: 4px;
    }
    
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }
    
    .msg {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      animation: msgIn 0.3s ease;
    }
    
    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .msg.user {
      flex-direction: row-reverse;
    }
    
    .msg-av {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.82rem;
      flex-shrink: 0;
    }
    
    .msg-av.bot {
      background: var(--gold);
      color: var(--navy);
    }
    
    .msg-av.user {
      background: var(--navy-light);
      color: var(--gold);
    }

    
    .bubble {
      max-width: 75%;
      padding: 0.85rem 1.1rem;
      border-radius: 16px;
      font-size: 0.87rem;
      line-height: 1.68;
    }
    
    .bubble.bot {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      border-bottom-left-radius: 4px;
    }
    
    .bubble.user {
      background: var(--gold);
      color: var(--navy);
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }
    
    .msg-time {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.28);
      margin-top: 0.25rem;
    }
    
    /* === INPUT AREA === */
    .input-area {
      padding: 1.5rem;
      background: rgba(0,0,0,0.22);
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    
    .action-buttons {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    
    .action-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .action-btn:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--border-gold);
      color: var(--gold-light);
    }
    
    .input-wrapper {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    
    .input-wrapper textarea {
      flex: 1;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 0.85rem 1.1rem;
      font-size: 0.92rem;
      color: var(--white);
      background: var(--navy-light);
      resize: none;
      min-height: 48px;
      max-height: 150px;
      font-family: inherit;
      transition: var(--transition);
    }

    
    .input-wrapper textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }
    
    .input-wrapper textarea::placeholder {
      color: rgba(255,255,255,0.35);
    }
    
    .btn-send {
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.5rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }
    
    .btn-send:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }
    
    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    /* === TYPING INDICATOR === */
    .typing {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.1rem;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      width: fit-content;
      margin-left: 2.5rem;
    }
    
    .typing.active {
      display: flex;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    
    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    
    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-8px);
      }
    }
  </style>
</head>
<body>


  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">L</div>
      <div class="logo-text">Luminom <em>IA</em></div>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="btn-home">← Inicio</a>
      <div class="user-pill">
        <span id="topbarUserName">Usuario</span>
      </div>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    
    <!-- SIDEBAR -->
    <div class="sidebar">
      
      <!-- Profile Section -->
      <div class="sidebar-section">
        <div class="sidebar-label">MI PERFIL</div>
        <div class="profile-row">
          <div class="avatar" id="sidebarAvatar">U</div>
          <div>
            <div class="profile-name" id="sidebarUserName">Usuario</div>
            <div class="profile-carrera" id="sidebarCarrera">Estudiante</div>
          </div>
        </div>
        <div class="tags">
          <span class="tag" id="planBadge">Gratis</span>
        </div>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-value" id="questionCount">0</div>
            <div class="stat-label">Preguntas</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="chatCount">0</div>
            <div class="stat-label">Chats</div>
          </div>
        </div>
      </div>

      <!-- New Chat Button -->
      <div class="sidebar-section">
        <button class="new-chat-btn" onclick="newChat()">
          ➕ Nueva conversación
        </button>
      </div>

      <!-- Quick Actions -->
      <div class="sidebar-section">
        <div class="sidebar-label">ACCIONES RÁPIDAS</div>
        <div class="quick-list">
          <button class="qbtn" onclick="quickAction('plan')">📅 Plan de estudio</button>
          <button class="qbtn" onclick="quickAction('help')">💡 Ayuda con tarea</button>
          <button class="qbtn" onclick="quickAction('explain')">📖 Explicar concepto</button>
          <button class="qbtn" onclick="quickAction('practice')">✍️ Ejercicios prácticos</button>
        </div>
      </div>

      <!-- History Section -->
      <div class="sidebar-section" style="flex:1;overflow-y:auto;">
        <div class="sidebar-label">HISTORIAL</div>
        <div id="historyList"></div>
      </div>
      
    </div>


    <!-- CHAT AREA -->
    <div class="chat-area">
      
      <!-- Chat Header -->
      <div class="chat-header">
        <div class="ch-avatar">L</div>
        <div>
          <div class="ch-name">Luminom IA</div>
          <div class="ch-status">
            <span class="ch-dot"></span>
            <span>Asistente activo</span>
          </div>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages" id="messages">
        <!-- Welcome message will be added via JavaScript -->
      </div>

      <!-- Typing Indicator -->
      <div class="typing" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="action-buttons">
          <button class="action-btn" onclick="exportToPDF()">
            📄 Exportar PDF
          </button>
          <label class="action-btn" style="cursor:pointer;">
            📎 Subir archivo
            <input type="file" id="fileInput" accept="image/*,.pdf" style="display:none;" onchange="handleFileUpload(event)"/>
          </label>
          <button class="action-btn" id="voiceBtn" onclick="toggleVoice()">
            🎤 Voz
          </button>
        </div>
        <div class="input-wrapper">
          <textarea 
            id="chatInput" 
            placeholder="Escribe tu pregunta..." 
            rows="1"
            onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"
          ></textarea>
          <button class="btn-send" id="sendBtn" onclick="sendMessage()">
            Enviar
          </button>
        </div>
      </div>
      
    </div>

  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <!-- jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <!-- PDF.js for PDF text extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>

    // ============================================
    // FIREBASE CONFIGURATION
    // ============================================
    const firebaseConfig = {
      apiKey: "AIzaSyDzS5dYHznoTUsYYxWxfcA5JAHPMOJkSMA",
      authDomain: "luminom-ia.firebaseapp.com",
      projectId: "luminom-ia",
      storageBucket: "luminom-ia.firebasestorage.app",
      messagingSenderId: "532433042280",
      appId: "1:532433042280:web:ae5f09598957e2bf8a34dd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    console.log('✅ Firebase initialized');

    // ============================================
    // API CONFIGURATION
    // ============================================
    const API_PARTS = ['gsk_','8g9V37JS','uol85XAO','0DtQWGdy','b3FYq2RY','aCRaXqoH','qTZvT6l7','zAKM'];
    const API_KEY = API_PARTS.join('');

    // ============================================
    // GLOBAL STATE
    // ============================================
    let currentUser = null;
    let currentChatId = null;
    let chatHistory = [];
    let questionCount = 0;
    let isRecording = false;
    let recognition = null;
    let attachedFile = null;
    let attachedFileText = null;

    // ============================================
    // AUTHENTICATION CHECK
    // ============================================
    function checkAuth() {
      const sessionData = sessionStorage.getItem('luminom_session');
      if (!sessionData) {
        console.log('❌ No session found - redirecting to login');
        window.location.href = 'login.html';
        return false;
      }
      
      try {
        currentUser = JSON.parse(sessionData);
        console.log('✅ User authenticated:', currentUser.email);
        return true;
      } catch (e) {
        console.error('❌ Error parsing session:', e);
        window.location.href = 'login.html';
        return false;
      }
    }

    // ============================================
    // LOAD USER PROFILE
    // ============================================
    function loadUserProfile() {
      if (!currentUser) return;
      
      const userName = currentUser.name || currentUser.email.split('@')[0];
      const initial = userName.charAt(0).toUpperCase();
      
      document.getElementById('topbarUserName').textContent = userName;
      document.getElementById('sidebarUserName').textContent = userName;
      document.getElementById('sidebarCarrera').textContent = currentUser.carrera || 'Estudiante';
      document.getElementById('sidebarAvatar').textContent = initial;
      
      // Set plan badge
      const planBadge = document.getElementById('planBadge');
      const plan = currentUser.plan || 'free';
      
      if (plan === 'premium') {
        planBadge.textContent = '⭐ Premium';
        planBadge.style.background = 'linear-gradient(135deg,#f59e0b,#d97706)';
        planBadge.style.borderColor = '#f59e0b';
        planBadge.style.color = '#FFF';
      } else if (plan === 'lifetime') {
        planBadge.textContent = '👑 Lifetime';
        planBadge.style.background = 'linear-gradient(135deg,#8b5cf6,#7c3aed)';
        planBadge.style.borderColor = '#8b5cf6';
        planBadge.style.color = '#FFF';
      } else {
        planBadge.textContent = '🆓 Gratis';
      }
      
      // Load question counter
      questionCount = parseInt(localStorage.getItem('luminom_questions_' + currentUser.userId) || '0');
      document.getElementById('questionCount').textContent = questionCount;
      
      console.log('✅ Profile loaded');
    }


    // ============================================
    // LOGOUT
    // ============================================
    window.logout = function() {
      if (confirm('¿Estás seguro de cerrar sesión?')) {
        sessionStorage.removeItem('luminom_session');
        window.location.href = 'login.html';
      }
    }

    // ============================================
    // MESSAGES UI
    // ============================================
    function addMessage(role, content, scroll = true) {
      const messagesContainer = document.getElementById('messages');
      const isUser = role === 'user';
      const time = new Date().toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
      
      const messageDiv = document.createElement('div');
      messageDiv.className = 'msg' + (isUser ? ' user' : '');
      
      const avatar = isUser ? currentUser.name.charAt(0).toUpperCase() : 'L';
      
      messageDiv.innerHTML = `
        <div class="msg-av ${isUser ? 'user' : 'bot'}">${avatar}</div>
        <div>
          <div class="bubble ${isUser ? 'user' : 'bot'}">${content}</div>
          <div class="msg-time">${time}</div>
        </div>
      `;
      
      messagesContainer.appendChild(messageDiv);
      
      if (scroll) {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }
    }

    // ============================================
    // SEND MESSAGE
    // ============================================
    window.sendMessage = async function() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      
      if (!message && !attachedFileText) return;
      
      // Disable input
      input.disabled = true;
      document.getElementById('sendBtn').disabled = true;
      
      // Build full message
      let fullMessage = message;
      if (attachedFileText) {
        fullMessage = `[Archivo adjunto: ${attachedFile.name}]\n\nContenido:\n${attachedFileText.substring(0, 3000)}\n\nPregunta: ${message}`;
      }
      
      // Add user message
      addMessage('user', message || `📎 ${attachedFile.name}`);
      input.value = '';
      
      // Clear file
      if (attachedFile) {
        attachedFile = null;
        attachedFileText = null;
      }
      
      // Show typing
      document.getElementById('typingIndicator').classList.add('active');
      
      // Increment counter
      questionCount++;
      document.getElementById('questionCount').textContent = questionCount;
      localStorage.setItem('luminom_questions_' + currentUser.userId, questionCount.toString());
      
      try {
        // Call API
        const response = await callAPI(fullMessage);
        
        // Hide typing
        document.getElementById('typingIndicator').classList.remove('active');
        
        // Add response
        addMessage('assistant', response);
        
        // Save to Firebase
        await saveToFirebase(message, response);
        
      } catch (error) {
        console.error('❌ Error:', error);
        document.getElementById('typingIndicator').classList.remove('active');
        addMessage('assistant', '❌ Lo siento, hubo un error. Por favor intenta de nuevo.');
      }
      
      // Re-enable input
      input.disabled = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }


    // ============================================
    // API CALL
    // ============================================
    async function callAPI(userMessage) {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            {
              role: 'system',
              content: 'Eres un tutor académico experto y amigable. Ayudas a estudiantes con sus tareas, explicaciones y dudas. Sé claro, didáctico y paciente. Responde en español siempre.'
            },
            {
              role: 'user',
              content: userMessage
            }
          ],
          temperature: 0.7,
          max_tokens: 2048
        })
      });
      
      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }
      
      const data = await response.json();
      return data.choices[0].message.content;
    }

    // ============================================
    // SAVE TO FIREBASE
    // ============================================
    async function saveToFirebase(userMsg, botMsg) {
      if (!currentUser) return;
      
      const timestamp = new Date().toISOString();
      
      try {
        if (currentChatId) {
          // Update existing chat
          const chatRef = db.collection('chats').doc(currentChatId);
          const chatDoc = await chatRef.get();
          const messages = chatDoc.data().messages || [];
          
          messages.push(
            { role: 'user', content: userMsg, timestamp },
            { role: 'assistant', content: botMsg, timestamp }
          );
          
          await chatRef.update({
            messages,
            updatedAt: timestamp
          });
          
        } else {
          // Create new chat
          const title = userMsg.substring(0, 50) + (userMsg.length > 50 ? '...' : '');
          
          const newChat = {
            userId: currentUser.userId,
            title,
            messages: [
              { role: 'user', content: userMsg, timestamp },
              { role: 'assistant', content: botMsg, timestamp }
            ],
            createdAt: timestamp,
            updatedAt: timestamp
          };
          
          const docRef = await db.collection('chats').add(newChat);
          currentChatId = docRef.id;
          
          // Reload history
          await loadHistory();
        }
        
        console.log('✅ Saved to Firebase');
      } catch (error) {
        console.error('❌ Error saving:', error);
      }
    }


    // ============================================
    // LOAD CHAT HISTORY
    // ============================================
    async function loadHistory() {
      if (!currentUser) return;
      
      try {
        const snapshot = await db.collection('chats')
          .where('userId', '==', currentUser.userId)
          .orderBy('updatedAt', 'desc')
          .limit(20)
          .get();
        
        chatHistory = [];
        snapshot.forEach(doc => {
          chatHistory.push({ id: doc.id, ...doc.data() });
        });
        
        // Update UI
        const historyList = document.getElementById('historyList');
        
        if (chatHistory.length === 0) {
          historyList.innerHTML = '<div style="color:rgba(255,255,255,0.4);text-align:center;font-size:0.75rem;">Sin historial</div>';
        } else {
          historyList.innerHTML = chatHistory.map(chat => {
            const date = new Date(chat.updatedAt);
            const dateStr = date.toLocaleDateString('es-CO', {month: 'short', day: 'numeric'});
            return `
              <div class="history-item" onclick="loadChat('${chat.id}')">
                <div style="font-weight:600;margin-bottom:0.2rem;">${chat.title}</div>
                <div style="font-size:0.7rem;color:rgba(255,255,255,0.35);">${dateStr}</div>
              </div>
            `;
          }).join('');
        }
        
        document.getElementById('chatCount').textContent = chatHistory.length;
        
        console.log(`✅ Loaded ${chatHistory.length} chats`);
      } catch (error) {
        console.error('❌ Error loading history:', error);
      }
    }

    // ============================================
    // LOAD SPECIFIC CHAT
    // ============================================
    window.loadChat = async function(chatId) {
      try {
        const doc = await db.collection('chats').doc(chatId).get();
        
        if (!doc.exists) return;
        
        const chatData = doc.data();
        currentChatId = chatId;
        
        // Clear messages
        const messagesContainer = document.getElementById('messages');
        messagesContainer.innerHTML = '';
        
        // Render messages
        chatData.messages.forEach(msg => {
          addMessage(msg.role, msg.content, false);
        });
        
        // Scroll to bottom
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        
        console.log(`✅ Loaded chat: ${chatId}`);
      } catch (error) {
        console.error('❌ Error loading chat:', error);
      }
    }

    // ============================================
    // NEW CHAT
    // ============================================
    window.newChat = function() {
      currentChatId = null;
      const messagesContainer = document.getElementById('messages');
      messagesContainer.innerHTML = '';
      
      addMessage('assistant', '¡Hola! Soy tu tutor con IA. Estoy aquí para ayudarte con tus tareas y dudas académicas. ¿En qué puedo ayudarte?');
      
      document.getElementById('chatInput').focus();
      console.log('✅ New chat started');
    }


    // ============================================
    // QUICK ACTIONS
    // ============================================
    window.quickAction = function(type) {
      const prompts = {
        plan: 'Genera un plan de estudio detallado para: ',
        help: 'Necesito ayuda con esta tarea: ',
        explain: 'Por favor explícame el concepto de: ',
        practice: 'Dame ejercicios prácticos sobre: '
      };
      
      const input = document.getElementById('chatInput');
      input.value = prompts[type];
      input.focus();
      
      // Move cursor to end
      const len = input.value.length;
      input.setSelectionRange(len, len);
    }

    // ============================================
    // EXPORT TO PDF
    // ============================================
    window.exportToPDF = function() {
      const messages = Array.from(document.querySelectorAll('.msg'));
      
      if (messages.length === 0) {
        alert('⚠️ No hay mensajes para exportar');
        return;
      }
      
      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Header
        doc.setFontSize(20);
        doc.text('Chat - Luminom IA', 20, 20);
        
        doc.setFontSize(10);
        doc.text(`Usuario: ${currentUser.name || currentUser.email}`, 20, 30);
        doc.text(`Fecha: ${new Date().toLocaleDateString('es-CO')}`, 20, 35);
        
        let yPos = 45;
        
        messages.forEach((msg) => {
          const isUser = msg.classList.contains('user');
          const bubble = msg.querySelector('.bubble');
          const text = bubble.textContent.trim();
          
          if (yPos > 270) {
            doc.addPage();
            yPos = 20;
          }
          
          doc.setFont(undefined, 'bold');
          doc.text(isUser ? '👤 Tú' : '🤖 IA', 20, yPos);
          yPos += 5;
          
          doc.setFont(undefined, 'normal');
          const lines = doc.splitTextToSize(text, 170);
          doc.text(lines, 20, yPos);
          
          yPos += (lines.length * 5) + 5;
        });
        
        doc.save(`chat-luminom-${new Date().toISOString().split('T')[0]}.pdf`);
        alert('✅ Chat exportado a PDF exitosamente');
      } catch (error) {
        console.error('Error al exportar PDF:', error);
        alert('⚠️ Error al exportar PDF');
      }
    }

    // ============================================
    // FILE UPLOAD
    // ============================================
    window.handleFileUpload = async function(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      attachedFile = file;
      
      // If PDF, extract text
      if (file.type === 'application/pdf') {
        try {
          alert('📄 Extrayendo texto del PDF...');
          
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
          let fullText = '';
          
          for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(' ');
            fullText += pageText + '\n\n';
          }
          
          attachedFileText = fullText;
          alert('✅ Texto extraído del PDF. Ahora escribe tu pregunta sobre el documento.');
          console.log('✅ PDF text extracted');
        } catch (error) {
          console.error('❌ Error extracting PDF:', error);
          alert('⚠️ Error al extraer texto del PDF');
        }
      } else if (file.type.startsWith('image/')) {
        alert('📸 Imagen cargada. Escribe tu pregunta sobre la imagen.');
      }
      
      // Focus input
      document.getElementById('chatInput').focus();
    }


    // ============================================
    // VOICE RECOGNITION
    // ============================================
    window.toggleVoice = function() {
      if (!isRecording) {
        startVoice();
      } else {
        stopVoice();
      }
    }
    
    function startVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('⚠️ Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.');
        return;
      }
      
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'es-ES';
      recognition.continuous = false;
      recognition.interimResults = false;
      
      recognition.onstart = () => {
        isRecording = true;
        document.getElementById('voiceBtn').style.background = 'linear-gradient(135deg,#ef4444,#dc2626)';
        document.getElementById('voiceBtn').style.color = 'white';
        console.log('🎤 Recording...');
      };
      
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('chatInput').value = transcript;
        stopVoice();
      };
      
      recognition.onerror = (event) => {
        console.error('🎤 Error:', event.error);
        stopVoice();
      };
      
      recognition.onend = () => {
        stopVoice();
      };
      
      recognition.start();
    }
    
    function stopVoice() {
      if (recognition) {
        recognition.stop();
      }
      isRecording = false;
      document.getElementById('voiceBtn').style.background = '';
      document.getElementById('voiceBtn').style.color = '';
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() {
      console.log('🚀 Initializing Luminom IA Tutor...');
      
      // Check authentication
      if (!checkAuth()) return;
      
      // Load profile
      loadUserProfile();
      
      // Load history
      await loadHistory();
      
      // Add welcome message
      addMessage('assistant', '¡Hola! Soy tu tutor con IA. Estoy aquí para ayudarte con tus tareas y dudas académicas. ¿En qué puedo ayudarte?');
      
      // Focus input
      document.getElementById('chatInput').focus();
      
      console.log('✅ Tutor initialized successfully');
    }

    // Start when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
