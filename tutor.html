<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mi Tutor | Luminom IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:#0A1628; --navy-mid:#112240; --navy-light:#1C3461;
      --gold:#C9A84C; --gold-light:#E8C97A;
      --white:#FFFFFF; --off-white:#F8F6F1;
      --text-primary:#0A1628; --text-secondary:#4A5568;
      --border:rgba(10,22,40,0.1); --border-gold:rgba(201,168,76,0.3);
      --shadow-sm:0 2px 12px rgba(10,22,40,0.08);
      --shadow-md:0 8px 32px rgba(10,22,40,0.14);
      --radius-sm:8px; --radius-md:14px; --radius-lg:22px;
      --font-display:'Playfair Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --t:0.28s cubic-bezier(0.4,0,0.2,1);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font-body);background:var(--off-white);color:var(--text-primary);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
    
    /* Nav */
    .nav{background:var(--navy);padding:1rem 2rem;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
    .nav-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:0.6rem;color:var(--white);text-decoration:none;}
    .logo-mark{width:36px;height:36px;background:var(--gold);color:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:1.1rem;}
    .logo-text{font-family:var(--font-display);font-size:1.15rem;font-weight:600;}
    .logo-text em{font-style:italic;color:var(--gold);}
    .nav-actions{display:flex;align-items:center;gap:1.5rem;}
    .nav-user{display:flex;align-items:center;gap:1rem;}
    .nav-user-name{font-size:0.88rem;color:var(--gold);font-weight:600;}
    .btn-nav{background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);padding:0.5rem 1.2rem;border-radius:100px;font-size:0.82rem;font-weight:500;cursor:pointer;transition:var(--t);text-decoration:none;}
    .btn-nav:hover{border-color:var(--gold);color:var(--gold);}
    .btn-gold{background:var(--gold);color:var(--navy);border:none;font-weight:600;}
    .btn-gold:hover{background:var(--gold-light);}
    
    /* Chat Layout */
    .chat-layout{flex:1;display:flex;overflow:hidden;}
    .sidebar{width:280px;background:var(--white);border-right:1px solid var(--border);padding:1.5rem;overflow-y:auto;}
    .sidebar h3{font-family:var(--font-display);font-size:1rem;margin-bottom:1rem;color:var(--navy);}
    .sidebar-btn{width:100%;background:var(--gold);color:var(--navy);padding:0.75rem;border-radius:var(--radius-sm);border:none;font-weight:600;cursor:pointer;transition:var(--t);margin-bottom:1.5rem;}
    .sidebar-btn:hover{background:var(--gold-light);}
    .history-item{padding:0.65rem;background:var(--off-white);border-radius:var(--radius-sm);margin-bottom:0.5rem;font-size:0.82rem;color:var(--text-secondary);cursor:pointer;transition:var(--t);}
    .history-item:hover{background:rgba(201,168,76,0.1);}

    
    /* Chat Area */
    .chat-area{flex:1;display:flex;flex-direction:column;max-width:1100px;margin:0 auto;width:100%;}
    .messages{flex:1;overflow-y:auto;padding:2rem;display:flex;flex-direction:column;gap:1.5rem;}
    .messages::-webkit-scrollbar{width:8px;}
    .messages::-webkit-scrollbar-track{background:transparent;}
    .messages::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:10px;}
    .messages::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,0.5);}
    
    /* Messages */
    .message{display:flex;gap:1rem;align-items:flex-start;animation:slideIn 0.4s ease;}
    @keyframes slideIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .message.user{flex-direction:row-reverse;}
    .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.9rem;flex-shrink:0;}
    .message.bot .avatar{background:var(--gold);color:var(--navy);}
    .message.user .avatar{background:var(--navy);color:var(--gold);}
    .bubble{max-width:65%;padding:1.2rem 1.5rem;border-radius:var(--radius-md);line-height:1.7;box-shadow:var(--shadow-sm);}
    .message.bot .bubble{background:var(--white);border:1px solid var(--border);}
    .message.user .bubble{background:var(--navy);color:var(--white);}
    
    /* Welcome */
    .welcome{text-align:center;padding:3rem 2rem;max-width:700px;margin:0 auto;}
    .welcome h2{font-family:var(--font-display);font-size:2.2rem;font-weight:700;margin-bottom:1rem;color:var(--navy);}
    .welcome h2 .gold{color:var(--gold);font-style:italic;}
    .welcome p{font-size:1rem;color:var(--text-secondary);margin-bottom:2rem;}
    .quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;}
    .quick-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.2rem;text-align:left;cursor:pointer;transition:var(--t);}
    .quick-card:hover{border-color:var(--border-gold);box-shadow:var(--shadow-sm);transform:translateY(-3px);}
    .quick-icon{font-size:1.6rem;margin-bottom:0.5rem;display:block;}
    .quick-title{font-weight:600;font-size:0.9rem;color:var(--navy);}
    
    /* Input */
    .input-area{padding:1.5rem 2rem;background:var(--white);border-top:1px solid var(--border);}
    .input-wrapper{max-width:1100px;margin:0 auto;display:flex;gap:1rem;align-items:flex-end;}
    .input-wrapper textarea{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-md);padding:0.85rem 1.1rem;font-size:0.92rem;color:var(--navy);background:var(--white);resize:none;min-height:56px;max-height:150px;font-family:inherit;transition:var(--t);}
    .input-wrapper textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
    .input-wrapper textarea::placeholder{color:var(--text-muted);}
    .btn-send{background:var(--gold);color:var(--navy);border:none;padding:0.85rem 2rem;border-radius:100px;font-weight:700;font-size:0.95rem;cursor:pointer;transition:var(--t);}
    .btn-send:hover:not(:disabled){background:var(--gold-light);transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,0.35);}
    .btn-send:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    
    /* Typing */
    .typing-dots{display:flex;gap:0.4rem;padding:0.6rem 0;}
    .typing-dots span{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:typing 1.4s ease-in-out infinite;}
    .typing-dots span:nth-child(2){animation-delay:0.2s;}
    .typing-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes typing{0%,60%,100%{opacity:0.3;transform:scale(1);}30%{opacity:1;transform:scale(1.2);}}
    
    /* Code Blocks */
    code{background:rgba(201,168,76,0.1);padding:0.2rem 0.5rem;border-radius:4px;font-family:'Courier New',monospace;color:var(--navy);font-size:0.88em;}
    pre{background:var(--off-white);border:1px solid var(--border);padding:1rem;border-radius:var(--radius-sm);overflow-x:auto;margin:0.8rem 0;}
    pre code{background:none;padding:0;}
    strong{color:var(--gold);font-weight:700;}
    
    @media(max-width:900px){
      .chat-layout{flex-direction:column;}
      .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);padding:1rem;}
      .quick-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>


  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">L</span>
        <span class="logo-text">Luminom <em>IA</em></span>
      </a>
      <div class="nav-actions">
        <div class="nav-user">
          <span class="nav-user-name" id="userName">Cargando...</span>
        </div>
        <button class="btn-nav btn-gold" onclick="changeApiKey()">🔑 API Key</button>
        <a href="admin.html" class="btn-nav">Admin</a>
        <button class="btn-nav" onclick="Auth.logout()">Salir</button>
      </div>
    </div>
  </nav>

  <div class="chat-layout">
    <aside class="sidebar">
      <button class="sidebar-btn" onclick="newChat()">+ Nueva conversación</button>
      <h3>Historial</h3>
      <div id="historyList">
        <div class="history-item">Sin conversaciones previas</div>
      </div>
    </aside>

    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <h2>Hola, <span class="gold" id="welcomeName">estudiante</span> 👋</h2>
          <p>Soy tu tutor con IA. Puedo ayudarte con cualquier materia universitaria. Elige un tema o escribe tu pregunta:</p>
          <div class="quick-grid">
            <div class="quick-card" onclick="sendQuick('Explícame derivadas con un ejemplo paso a paso')">
              <span class="quick-icon">∫</span>
              <div class="quick-title">Cálculo</div>
            </div>
            <div class="quick-card" onclick="sendQuick('¿Cómo funciona un bucle for en Python?')">
              <span class="quick-icon">💻</span>
              <div class="quick-title">Programación</div>
            </div>
            <div class="quick-card" onclick="sendQuick('Explica la Segunda Ley de Newton')">
              <span class="quick-icon">⚛</span>
              <div class="quick-title">Física</div>
            </div>
            <div class="quick-card" onclick="sendQuick('¿Qué es oferta y demanda?')">
              <span class="quick-icon">📊</span>
              <div class="quick-title">Economía</div>
            </div>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea 
            id="userInput" 
            placeholder="Escribe tu pregunta aquí..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
            rows="1"
          ></textarea>
          <button class="btn-send" onclick="sendMessage()" id="sendBtn">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <script>

    // Sistema de Autenticación
    const Auth = {
      getSession() { try { return JSON.parse(localStorage.getItem('luminom_session')); } catch { return null; } },
      logout() { localStorage.removeItem('luminom_session'); window.location.href = 'index.html'; },
      requireAuth() {
        if (!this.getSession()) { window.location.href = 'login.html?next=tutor'; return false; }
        return true;
      }
    };

    // VERIFICAR AUTENTICACIÓN (OBLIGATORIA)
    if (!Auth.requireAuth()) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;">Redirigiendo...</div>';
    }

    // Mostrar nombre del usuario
    const session = Auth.getSession();
    document.getElementById('userName').textContent = session.name;
    document.getElementById('welcomeName').textContent = session.name;

    // Configuración de API
    const API_CONFIG = {
      url: 'https://api.groq.com/openai/v1/chat/completions',
      key: localStorage.getItem('groq_api_key') || '',
      model: 'llama-3.3-70b-versatile'
    };

    let conversationHistory = [];

    // Verificar API Key al cargar
    window.addEventListener('DOMContentLoaded', () => {
      if (!API_CONFIG.key) {
        setTimeout(showApiKeyPrompt, 500);
      }
    });

    function showApiKeyPrompt() {
      const modal = `
        <div style="position:fixed;inset:0;background:rgba(10,22,40,0.95);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:9999;" id="apiModal">
          <div style="background:white;border-radius:22px;padding:3rem;max-width:520px;box-shadow:0 20px 80px rgba(0,0,0,0.3);">
            <h2 style="font-family:var(--font-display);font-size:1.8rem;color:var(--navy);margin-bottom:1rem;">🔑 Configura tu API Key</h2>
            <p style="color:var(--text-secondary);margin-bottom:1.5rem;line-height:1.7;">Para usar Luminom IA necesitas una <strong style="color:var(--gold);">API Key gratuita</strong> de Groq:</p>
            <ol style="color:var(--text-secondary);margin-bottom:2rem;line-height:1.9;padding-left:1.5rem;">
              <li>Ve a <a href="https://console.groq.com" target="_blank" style="color:var(--gold);font-weight:600;">console.groq.com</a></li>
              <li>Crea una cuenta (gratis, sin tarjeta)</li>
              <li>Ve a <strong>API Keys</strong> → <strong>Create API Key</strong></li>
              <li>Copia tu key (empieza con gsk_)</li>
            </ol>
            <input type="text" id="apiKeyInput" placeholder="Pega tu API Key aquí..." style="width:100%;padding:0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;margin-bottom:1.5rem;"/>
            <div style="display:flex;gap:1rem;">
              <button onclick="saveApiKey()" style="flex:1;background:var(--gold);color:var(--navy);border:none;padding:0.9rem;border-radius:100px;font-weight:700;cursor:pointer;font-size:0.95rem;">Guardar</button>
              <button onclick="document.getElementById('apiModal').remove()" style="padding:0.9rem 1.5rem;background:transparent;border:1.5px solid var(--border);border-radius:100px;color:var(--text-secondary);cursor:pointer;font-weight:600;">Cancelar</button>
            </div>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modal);
      document.getElementById('apiKeyInput').focus();
    }

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key && key.startsWith('gsk_')) {
        API_CONFIG.key = key;
        localStorage.setItem('groq_api_key', key);
        document.getElementById('apiModal').remove();
        alert('✅ API Key guardada correctamente');
      } else {
        alert('⚠️ La API Key debe empezar con "gsk_"');
      }
    }

    function changeApiKey() {
      if (confirm('¿Quieres cambiar tu API Key?')) {
        localStorage.removeItem('groq_api_key');
        API_CONFIG.key = '';
        showApiKeyPrompt();
      }
    }


    function hideWelcome() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';
    }

    function addMessage(content, isUser) {
      hideWelcome();
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = isUser ? session.name[0].toUpperCase() : 'L';
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessage(content);
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function formatMessage(text) {
      text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${escapeHtml(code.trim())}</code></pre>`
      );
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showTyping() {
      hideWelcome();
      const messagesDiv = document.getElementById('messages');
      const typingDiv = document.createElement('div');
      typingDiv.id = 'typing';
      typingDiv.className = 'message bot';
      typingDiv.innerHTML = `
        <div class="avatar">L</div>
        <div class="bubble typing-dots">
          <span></span><span></span><span></span>
        </div>
      `;
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function callGroqAPI(userMessage) {
      const systemPrompt = `Eres Luminom IA, un tutor universitario experto para estudiantes colombianos.

El estudiante actual es ${session.name}, de la carrera ${session.carrera}.

Tu misión: Ayudar a entender temas académicos de forma clara, paso a paso y motivadora.

ESTILO DE RESPUESTA:
- Siempre en español claro y natural
- Tono cercano y motivador (como un amigo inteligente)
- Explicaciones paso a paso con ejemplos
- Para matemáticas: muestra los pasos numerados
- Para código: usa bloques de código bien formateados
- Máximo 4 párrafos por respuesta (sé conciso pero completo)
- Usa ejemplos del contexto colombiano cuando sea relevante

MATERIAS QUE DOMINAS:
- Matemáticas (Cálculo, Álgebra, Estadística)
- Programación (Python, JavaScript, Java, C++)
- Física (Mecánica, Termodinámica, Cuántica)
- Química (Orgánica, Inorgánica)
- Economía (Micro, Macro)
- Derecho (Constitucional, Civil, Penal)

NUNCA inventes datos, fórmulas o teoremas que no existen.`;

      try {
        const response = await fetch(API_CONFIG.url, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_CONFIG.key}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: API_CONFIG.model,
            messages: [
              { role: 'system', content: systemPrompt },
              ...conversationHistory,
              { role: 'user', content: userMessage }
            ],
            temperature: 0.7,
            max_tokens: 2000,
            top_p: 1,
            stream: false
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          
          if (response.status === 401) {
            localStorage.removeItem('groq_api_key');
            API_CONFIG.key = '';
            throw new Error('API Key inválida o expirada');
          }
          
          throw new Error(errorData.error?.message || `Error ${response.status}`);
        }

        const data = await response.json();
        return data.choices[0]?.message?.content || 'No pude generar respuesta';
      } catch (error) {
        console.error('Error:', error);
        
        if (error.message.includes('API Key')) {
          showApiKeyPrompt();
          return `⚠️ **API Key inválida**\n\nTu API Key no funciona. Por favor:\n1. Verifica que la copiaste completa\n2. Genera una nueva en console.groq.com\n3. Haz clic en "🔑 API KEY" para actualizarla`;
        }
        
        return `⚠️ **Error de conexión**\n\n${error.message}\n\n**Soluciones:**\n- Verifica tu API Key\n- Espera 10 segundos e intenta de nuevo\n- Recarga la página si persiste`;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      if (!API_CONFIG.key) {
        showApiKeyPrompt();
        return;
      }
      
      input.value = '';
      input.style.height = 'auto';
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.textContent = 'Enviando...';
      
      addMessage(message, true);
      conversationHistory.push({ role: 'user', content: message });
      
      showTyping();
      
      const aiResponse = await callGroqAPI(message);
      
      hideTyping();
      addMessage(aiResponse, false);
      
      conversationHistory.push({ role: 'assistant', content: aiResponse });
      
      if (conversationHistory.length > 20) {
        conversationHistory = conversationHistory.slice(-20);
      }
      
      sendBtn.disabled = false;
      sendBtn.textContent = 'Enviar';
      input.focus();
    }

    function sendQuick(question) {
      document.getElementById('userInput').value = question;
      sendMessage();
    }

    function newChat() {
      if (confirm('¿Iniciar nueva conversación? Se perderá el historial actual.')) {
        conversationHistory = [];
        document.getElementById('messages').innerHTML = `
          <div class="welcome" id="welcome">
            <h2>Hola, <span class="gold" id="welcomeName">${session.name}</span> 👋</h2>
            <p>Soy tu tutor con IA. Puedo ayudarte con cualquier materia universitaria. Elige un tema o escribe tu pregunta:</p>
            <div class="quick-grid">
              <div class="quick-card" onclick="sendQuick('Explícame derivadas con un ejemplo paso a paso')">
                <span class="quick-icon">∫</span>
                <div class="quick-title">Cálculo</div>
              </div>
              <div class="quick-card" onclick="sendQuick('¿Cómo funciona un bucle for en Python?')">
                <span class="quick-icon">💻</span>
                <div class="quick-title">Programación</div>
              </div>
              <div class="quick-card" onclick="sendQuick('Explica la Segunda Ley de Newton')">
                <span class="quick-icon">⚛</span>
                <div class="quick-title">Física</div>
              </div>
              <div class="quick-card" onclick="sendQuick('¿Qué es oferta y demanda?')">
                <span class="quick-icon">📊</span>
                <div class="quick-title">Economía</div>
              </div>
            </div>
          </div>
        `;
        document.getElementById('userInput').focus();
      }
    }

    // Auto-resize textarea
    document.getElementById('userInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    document.getElementById('userInput').focus();
  </script>
</body>
</html>
