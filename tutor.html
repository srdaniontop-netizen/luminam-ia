<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mi Tutor | Luminom IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{
      --navy:#0A1628;
      --navy-mid:#112240;
      --navy-light:#1C3461;
      --gold:#C9A84C;
      --gold-light:#E8C97A;
      --white:#FFFFFF;
      --border-gold:rgba(201,168,76,0.3);
      --font-display:'Playfair Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --t:0.25s cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:var(--font-body);background:var(--navy);color:var(--white);display:flex;flex-direction:column;}
    
    /* TOPBAR */
    .topbar{height:60px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;}
    .logo{display:flex;align-items:center;gap:0.6rem;}
    .logo-mark{width:32px;height:32px;background:var(--gold);color:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:0.95rem;flex-shrink:0;}
    .logo-text{font-family:var(--font-display);font-size:1rem;font-weight:600;}
    .logo-text em{font-style:italic;color:var(--gold);}
    .topbar-right{display:flex;align-items:center;gap:1rem;}
    .user-pill{display:flex;align-items:center;gap:0.5rem;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:0.35rem 0.9rem;font-size:0.8rem;}
    .user-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;box-shadow:0 0 6px #4ade80;animation:pd 2s infinite;}
    @keyframes pd{0%,100%{opacity:1;}50%{opacity:0.5;}}
    .btn-logout{background:transparent;border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.55);padding:0.35rem 0.9rem;border-radius:100px;font-size:0.78rem;cursor:pointer;transition:var(--t);}
    .btn-logout:hover{border-color:rgba(255,255,255,0.4);color:var(--white);}
    .btn-home{color:rgba(255,255,255,0.45);font-size:0.8rem;transition:var(--t);text-decoration:none;}
    .btn-home:hover{color:var(--gold);}
    
    /* LAYOUT */
    .main{flex:1;display:flex;overflow:hidden;}
    
    /* SIDEBAR */
    .sidebar{width:280px;background:rgba(0,0,0,0.22);border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}

    .sidebar-section{padding:1.25rem 1.1rem;border-bottom:1px solid rgba(255,255,255,0.06);}
    .sidebar-section:last-child{border-bottom:none;}
    .sidebar-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.14em;color:rgba(255,255,255,0.35);margin-bottom:0.75rem;font-weight:600;}
    .profile-row{display:flex;align-items:center;gap:0.75rem;}
    .avatar{width:42px;height:42px;background:var(--gold);color:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:1.1rem;flex-shrink:0;}
    .profile-name{font-weight:600;font-size:0.88rem;}
    .profile-carrera{font-size:0.72rem;color:rgba(255,255,255,0.45);margin-top:0.1rem;}
    .tags{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.5rem;}
    .tag{font-size:0.68rem;background:rgba(201,168,76,0.1);border:1px solid var(--border-gold);color:#E8C97A;padding:0.22rem 0.6rem;border-radius:100px;}
    .quick-list{display:flex;flex-direction:column;gap:0.4rem;}
    .qbtn{text-align:left;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:rgba(255,255,255,0.65);padding:0.55rem 0.75rem;border-radius:8px;font-size:0.76rem;cursor:pointer;transition:var(--t);line-height:1.4;}
    .qbtn:hover{background:rgba(201,168,76,0.1);border-color:var(--border-gold);color:#E8C97A;}
    .new-chat-btn{display:flex;align-items:center;justify-content:center;gap:0.5rem;width:100%;background:rgba(201,168,76,0.12);border:1px solid var(--border-gold);color:var(--gold-light);padding:0.65rem;border-radius:10px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:var(--t);}
    .new-chat-btn:hover{background:rgba(201,168,76,0.22);}
    .history-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);padding:0.6rem;border-radius:8px;font-size:0.76rem;cursor:pointer;transition:var(--t);margin-bottom:0.4rem;}
    .history-item:hover{background:rgba(201,168,76,0.1);border-color:var(--border-gold);}
    
    /* CHAT AREA */
    .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .chat-header{padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:0.75rem;flex-shrink:0;}
    .ch-avatar{width:36px;height:36px;background:var(--gold);color:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:0.95rem;flex-shrink:0;}
    .ch-name{font-weight:600;font-size:0.9rem;}
    .ch-status{font-size:0.72rem;color:rgba(255,255,255,0.42);display:flex;align-items:center;gap:0.35rem;}
    .ch-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;}
    
    /* MESSAGES */
    .messages{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.1rem;}
    .messages::-webkit-scrollbar{width:4px;}
    .messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px;}
    .msg{display:flex;gap:0.75rem;align-items:flex-start;animation:msgIn 0.3s ease;}
    @keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .msg.user{flex-direction:row-reverse;}
    .msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:0.82rem;flex-shrink:0;}
    .msg-av.bot{background:var(--gold);color:var(--navy);}
    .msg-av.user{background:var(--navy-light);color:var(--gold);}
    .bubble{max-width:75%;padding:0.85rem 1.1rem;border-radius:16px;font-size:0.87rem;line-height:1.68;}
    .bubble.bot{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);border-bottom-left-radius:4px;}
    .bubble.user{background:var(--gold);color:var(--navy);font-weight:500;border-bottom-right-radius:4px;}
    .msg-time{font-size:0.65rem;color:rgba(255,255,255,0.28);margin-top:0.25rem;}

    
    /* INPUT AREA */
    .input-area{padding:1.5rem;background:rgba(0,0,0,0.22);border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
    .input-wrapper{display:flex;gap:0.75rem;align-items:flex-end;}
    .input-wrapper textarea{flex:1;border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:0.85rem 1.1rem;font-size:0.92rem;color:var(--white);background:var(--navy-light);resize:none;min-height:48px;max-height:150px;font-family:inherit;transition:var(--t);}
    .input-wrapper textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
    .input-wrapper textarea::placeholder{color:rgba(255,255,255,0.35);}
    .btn-send{background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:0.85rem 1.5rem;font-size:0.82rem;font-weight:600;cursor:pointer;transition:var(--t);flex-shrink:0;}
    .btn-send:hover{background:var(--gold-light);transform:translateY(-2px);}
    .btn-send:disabled{opacity:0.5;cursor:not-allowed;}
    
    /* FILE PREVIEW */
    .file-preview{display:none;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.75rem;margin-bottom:0.75rem;align-items:center;gap:0.75rem;}
    .file-preview.active{display:flex;}
    .file-preview-icon{font-size:1.8rem;}
    .file-preview-info{flex:1;}
    .file-preview-name{font-size:0.85rem;font-weight:600;color:var(--white);}
    .file-preview-size{font-size:0.72rem;color:rgba(255,255,255,0.45);margin-top:0.1rem;}
    .file-preview-remove{background:rgba(239,68,68,0.2);color:#ef4444;border:none;border-radius:6px;padding:0.4rem 0.8rem;font-size:0.75rem;cursor:pointer;transition:var(--t);}
    .file-preview-remove:hover{background:rgba(239,68,68,0.3);}
    
    /* TYPING INDICATOR */
    .typing{display:none;align-items:center;gap:0.5rem;padding:0.75rem 1.1rem;background:rgba(255,255,255,0.08);border-radius:16px;width:fit-content;}
    .typing.active{display:flex;}
    .typing-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:typing 1.4s infinite;}
    .typing-dot:nth-child(2){animation-delay:0.2s;}
    .typing-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes typing{0%,60%,100%{opacity:0.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-8px);}}
    
    /* MODAL */
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,22,40,0.9);z-index:10000;align-items:center;justify-content:center;}
    .modal.active{display:flex;}
    .modal-content{background:var(--white);border-radius:12px;padding:2rem;max-width:600px;width:90%;max-height:80vh;overflow-y:auto;color:var(--navy);}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
    .modal-title{font-family:var(--font-display);font-size:1.4rem;font-weight:600;color:var(--navy);}
    .modal-close{background:none;border:none;font-size:1.5rem;color:var(--navy);cursor:pointer;opacity:0.6;transition:var(--t);}
    .modal-close:hover{opacity:1;}
    .modal-body{line-height:1.7;}
    .modal-footer{margin-top:1.5rem;display:flex;gap:0.75rem;justify-content:flex-end;}
    .modal-btn{padding:0.75rem 1.5rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:var(--t);}
    .modal-btn-primary{background:var(--gold);color:var(--navy);}
    .modal-btn-primary:hover{background:var(--gold-light);}
    .modal-btn-secondary{background:rgba(10,22,40,0.1);color:var(--navy);}
    .modal-btn-secondary:hover{background:rgba(10,22,40,0.2);}
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">L</div>
      <div class="logo-text">Luminom <em>IA</em></div>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="btn-home">← Inicio</a>
      <div class="user-pill">
        <span class="user-dot"></span>
        <span id="topbarUserName">Usuario</span>
      </div>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    
    <!-- SIDEBAR -->
    <div class="sidebar">
      
      <!-- Profile Section -->
      <div class="sidebar-section">
        <div class="sidebar-label">MI PERFIL</div>
        <div class="profile-row">
          <div class="avatar" id="sidebarAvatar">U</div>
          <div>
            <div class="profile-name" id="sidebarUserName">Usuario</div>
            <div class="profile-carrera" id="sidebarCarrera">Estudiante</div>
          </div>
        </div>
        <div class="tags">
          <span class="tag" id="planBadge">Gratis</span>
        </div>
      </div>

      <!-- New Chat Button -->
      <div class="sidebar-section">
        <button class="new-chat-btn" onclick="newChat()">
          ➕ Nueva conversación
        </button>
      </div>

      <!-- Quick Actions -->
      <div class="sidebar-section">
        <div class="sidebar-label">ACCIONES RÁPIDAS</div>
        <div class="quick-list">
          <button class="qbtn" onclick="showFeature('studyPlan')">📅 Generar plan de estudio</button>
          <button class="qbtn" onclick="showFeature('library')">📚 Mi biblioteca</button>
          <button class="qbtn" onclick="showFeature('goals')">🎯 Mis objetivos</button>
          <button class="qbtn" onclick="showFeature('analytics')">📊 Análisis de progreso</button>
        </div>
      </div>

      <!-- History Section -->
      <div class="sidebar-section" style="flex:1;overflow-y:auto;">
        <div class="sidebar-label">HISTORIAL</div>
        <div id="historyList"></div>
      </div>
      
    </div>


    
    <!-- CHAT AREA -->
    <div class="chat-area">
      
      <!-- Chat Header -->
      <div class="chat-header">
        <div class="ch-avatar">L</div>
        <div>
          <div class="ch-name">Luminom IA</div>
          <div class="ch-status">
            <span class="ch-dot"></span>
            <span>Asistente activo</span>
          </div>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages" id="messages">
        <!-- Welcome message -->
        <div class="msg">
          <div class="msg-av bot">L</div>
          <div>
            <div class="bubble bot">
              ¡Hola! Soy tu asistente de estudio con IA. Estoy aquí para ayudarte con tus tareas, dudas académicas y estudio. ¿En qué puedo ayudarte hoy?
            </div>
            <div class="msg-time" id="welcomeTime"></div>
          </div>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div class="typing" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="file-preview" id="filePreview">
          <span class="file-preview-icon">📄</span>
          <div class="file-preview-info">
            <div class="file-preview-name" id="fileName"></div>
            <div class="file-preview-size" id="fileSize"></div>
          </div>
          <button class="file-preview-remove" onclick="removeFile()">Eliminar</button>
        </div>
        <div class="input-wrapper">
          <textarea 
            id="chatInput" 
            placeholder="Escribe tu pregunta o mensaje..." 
            rows="1"
            onkeydown="handleInputKeydown(event)"
          ></textarea>
          <button class="btn-send" id="sendBtn" onclick="sendMessage()">
            Enviar
          </button>
        </div>
      </div>
      
    </div>

  </div>


  <!-- MODAL for features -->
  <div class="modal" id="featureModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Título</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Content loaded dynamically -->
      </div>
      <div class="modal-footer" id="modalFooter">
        <!-- Buttons loaded dynamically -->
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    // ============================================
    // FIREBASE CONFIGURATION
    // ============================================
    const firebaseConfig = {
      apiKey: "AIzaSyDzS5dYHznoTUsYYxWxfcA5JAHPMOJkSMA",
      authDomain: "luminom-ia.firebaseapp.com",
      projectId: "luminom-ia",
      storageBucket: "luminom-ia.firebasestorage.app",
      messagingSenderId: "532433042280",
      appId: "1:532433042280:web:ae5f09598957e2bf8a34dd"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    console.log('✅ Firebase initialized');

    // ============================================
    // API CONFIGURATION (obfuscated)
    // ============================================
    const parts = ['gsk_','8g9V37JS','uol85XAO','0DtQWGdy','b3FYq2RY','aCRaXqoH','qTZvT6l7','zAKM'];
    const API_KEY = parts.join('');

    // ============================================
    // GLOBAL STATE
    // ============================================
    let currentUser = null;
    let currentChatId = null;
    let chatHistory = [];
    let attachedFile = null;


    // ============================================
    // AUTHENTICATION & INITIALIZATION
    // ============================================
    
    function checkAuth() {
      const sessionData = sessionStorage.getItem('luminom_session');
      if (!sessionData) {
        window.location.href = 'login.html';
        return false;
      }
      
      try {
        currentUser = JSON.parse(sessionData);
        console.log('✅ User session loaded:', currentUser);
        return true;
      } catch (e) {
        console.error('❌ Error parsing session:', e);
        window.location.href = 'login.html';
        return false;
      }
    }

    function loadUserProfile() {
      if (!currentUser) return;
      
      // Set user name and avatar
      const userName = currentUser.name || currentUser.email.split('@')[0];
      const initial = userName.charAt(0).toUpperCase();
      
      document.getElementById('topbarUserName').textContent = userName;
      document.getElementById('sidebarUserName').textContent = userName;
      document.getElementById('sidebarCarrera').textContent = currentUser.carrera || 'Estudiante';
      document.getElementById('sidebarAvatar').textContent = initial;
      
      // Set plan badge
      const planBadge = document.getElementById('planBadge');
      const plan = currentUser.plan || 'free';
      
      if (plan === 'premium') {
        planBadge.textContent = '⭐ Premium';
        planBadge.style.background = 'linear-gradient(135deg,#f59e0b,#d97706)';
        planBadge.style.borderColor = '#f59e0b';
      } else if (plan === 'lifetime') {
        planBadge.textContent = '👑 Lifetime';
        planBadge.style.background = 'linear-gradient(135deg,#8b5cf6,#7c3aed)';
        planBadge.style.borderColor = '#8b5cf6';
      } else {
        planBadge.textContent = '🆓 Gratis';
      }
      
      console.log('✅ Profile loaded');
    }

    function logout() {
      if (confirm('¿Estás seguro de cerrar sesión?')) {
        sessionStorage.removeItem('luminom_session');
        window.location.href = 'login.html';
      }
    }


    // ============================================
    // CHAT HISTORY LOADING
    // ============================================
    
    async function loadChatHistory() {
      if (!currentUser) return;
      
      try {
        const snapshot = await db.collection('chats')
          .where('userId', '==', currentUser.userId)
          .orderBy('updatedAt', 'desc')
          .limit(20)
          .get();
        
        chatHistory = [];
        snapshot.forEach(doc => {
          chatHistory.push({
            id: doc.id,
            ...doc.data()
          });
        });
        
        renderChatHistory();
        console.log(`✅ Loaded ${chatHistory.length} chats`);
      } catch (error) {
        console.error('❌ Error loading history:', error);
      }
    }

    function renderChatHistory() {
      const historyList = document.getElementById('historyList');
      
      if (chatHistory.length === 0) {
        historyList.innerHTML = '<div class="history-item" style="color:rgba(255,255,255,0.4);text-align:center;">Sin historial</div>';
        return;
      }
      
      historyList.innerHTML = chatHistory.map(chat => {
        const date = new Date(chat.updatedAt);
        const dateStr = date.toLocaleDateString('es-CO', {month: 'short', day: 'numeric'});
        const title = chat.title || 'Nueva conversación';
        
        return `
          <div class="history-item" onclick="loadChat('${chat.id}')">
            <div style="font-weight:600;margin-bottom:0.2rem;">${title}</div>
            <div style="font-size:0.7rem;color:rgba(255,255,255,0.35);">${dateStr}</div>
          </div>
        `;
      }).join('');
    }

    async function loadChat(chatId) {
      try {
        const doc = await db.collection('chats').doc(chatId).get();
        
        if (!doc.exists) {
          console.error('Chat not found');
          return;
        }
        
        const chatData = doc.data();
        currentChatId = chatId;
        
        // Clear and render messages
        const messagesContainer = document.getElementById('messages');
        messagesContainer.innerHTML = '';
        
        chatData.messages.forEach(msg => {
          addMessageToUI(msg.role, msg.content, false);
        });
        
        console.log(`✅ Loaded chat: ${chatId}`);
      } catch (error) {
        console.error('❌ Error loading chat:', error);
      }
    }


    // ============================================
    // NEW CHAT
    // ============================================
    
    function newChat() {
      currentChatId = null;
      const messagesContainer = document.getElementById('messages');
      messagesContainer.innerHTML = `
        <div class="msg">
          <div class="msg-av bot">L</div>
          <div>
            <div class="bubble bot">
              ¡Hola! Soy tu asistente de estudio con IA. Estoy aquí para ayudarte con tus tareas, dudas académicas y estudio. ¿En qué puedo ayudarte hoy?
            </div>
            <div class="msg-time">${new Date().toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        </div>
      `;
      document.getElementById('chatInput').focus();
      console.log('✅ New chat started');
    }

    // ============================================
    // MESSAGE SENDING
    // ============================================
    
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      // Disable input
      input.disabled = true;
      document.getElementById('sendBtn').disabled = true;
      
      // Add user message to UI
      addMessageToUI('user', message);
      input.value = '';
      
      // Show typing indicator
      document.getElementById('typingIndicator').classList.add('active');
      
      try {
        // Call API
        const response = await callGroqAPI(message);
        
        // Hide typing indicator
        document.getElementById('typingIndicator').classList.remove('active');
        
        // Add bot response to UI
        addMessageToUI('assistant', response);
        
        // Save to Firestore
        await saveChatToFirestore(message, response);
        
      } catch (error) {
        console.error('❌ Error:', error);
        document.getElementById('typingIndicator').classList.remove('active');
        addMessageToUI('assistant', '❌ Lo siento, hubo un error. Por favor intenta de nuevo.');
      }
      
      // Re-enable input
      input.disabled = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    function handleInputKeydown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }


    // ============================================
    // API CALL
    // ============================================
    
    async function callGroqAPI(userMessage) {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            {
              role: 'system',
              content: 'Eres un tutor académico experto en todas las materias. Ayudas a estudiantes con sus tareas, explicaciones y dudas. Sé claro, didáctico y paciente. Responde en español.'
            },
            {
              role: 'user',
              content: userMessage
            }
          ],
          temperature: 0.7,
          max_tokens: 2048
        })
      });
      
      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }
      
      const data = await response.json();
      return data.choices[0].message.content;
    }

    // ============================================
    // UI MESSAGE RENDERING
    // ============================================
    
    function addMessageToUI(role, content, scroll = true) {
      const messagesContainer = document.getElementById('messages');
      const isUser = role === 'user';
      const time = new Date().toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'});
      
      const messageDiv = document.createElement('div');
      messageDiv.className = `msg ${isUser ? 'user' : ''}`;
      
      messageDiv.innerHTML = `
        <div class="msg-av ${isUser ? 'user' : 'bot'}">
          ${isUser ? currentUser.name.charAt(0).toUpperCase() : 'L'}
        </div>
        <div>
          <div class="bubble ${isUser ? 'user' : 'bot'}">
            ${content}
          </div>
          <div class="msg-time">${time}</div>
        </div>
      `;
      
      messagesContainer.appendChild(messageDiv);
      
      if (scroll) {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }
    }


    // ============================================
    // FIRESTORE SAVING
    // ============================================
    
    async function saveChatToFirestore(userMessage, botResponse) {
      if (!currentUser) return;
      
      const timestamp = new Date().toISOString();
      
      try {
        if (currentChatId) {
          // Update existing chat
          const chatRef = db.collection('chats').doc(currentChatId);
          const chatDoc = await chatRef.get();
          const messages = chatDoc.data().messages || [];
          
          messages.push({
            role: 'user',
            content: userMessage,
            timestamp
          });
          messages.push({
            role: 'assistant',
            content: botResponse,
            timestamp
          });
          
          await chatRef.update({
            messages,
            updatedAt: timestamp
          });
          
          console.log('✅ Chat updated');
        } else {
          // Create new chat
          const title = userMessage.substring(0, 50) + (userMessage.length > 50 ? '...' : '');
          
          const newChat = {
            userId: currentUser.userId,
            title,
            messages: [
              {
                role: 'user',
                content: userMessage,
                timestamp
              },
              {
                role: 'assistant',
                content: botResponse,
                timestamp
              }
            ],
            createdAt: timestamp,
            updatedAt: timestamp
          };
          
          const docRef = await db.collection('chats').add(newChat);
          currentChatId = docRef.id;
          
          console.log('✅ New chat created:', currentChatId);
          
          // Reload history
          await loadChatHistory();
        }
      } catch (error) {
        console.error('❌ Error saving chat:', error);
      }
    }


    // ============================================
    // FILE HANDLING
    // ============================================
    
    function removeFile() {
      attachedFile = null;
      document.getElementById('filePreview').classList.remove('active');
    }

    // ============================================
    // MODAL & FEATURES
    // ============================================
    
    function showFeature(featureName) {
      const modal = document.getElementById('featureModal');
      const title = document.getElementById('modalTitle');
      const body = document.getElementById('modalBody');
      const footer = document.getElementById('modalFooter');
      
      if (featureName === 'studyPlan') {
        title.textContent = '📅 Generar Plan de Estudio';
        body.innerHTML = `
          <p style="margin-bottom:1rem;">Crea un plan de estudio personalizado para tu materia.</p>
          <label style="display:block;margin-bottom:0.5rem;font-weight:600;">Materia o tema:</label>
          <input type="text" id="studySubject" placeholder="Ej: Cálculo Diferencial" style="width:100%;padding:0.75rem;border:1.5px solid rgba(10,22,40,0.2);border-radius:8px;margin-bottom:1rem;font-size:0.9rem;" />
          
          <label style="display:block;margin-bottom:0.5rem;font-weight:600;">Tiempo disponible:</label>
          <select id="studyTime" style="width:100%;padding:0.75rem;border:1.5px solid rgba(10,22,40,0.2);border-radius:8px;font-size:0.9rem;">
            <option value="1">1 semana</option>
            <option value="2">2 semanas</option>
            <option value="4">1 mes</option>
            <option value="8">2 meses</option>
          </select>
        `;
        footer.innerHTML = `
          <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Cancelar</button>
          <button class="modal-btn modal-btn-primary" onclick="generateStudyPlan()">Generar Plan</button>
        `;
      } else if (featureName === 'library') {
        title.textContent = '📚 Mi Biblioteca';
        body.innerHTML = '<p style="text-align:center;color:rgba(10,22,40,0.5);padding:2rem;">Función en desarrollo. Pronto podrás guardar y organizar tus recursos de estudio.</p>';
        footer.innerHTML = `<button class="modal-btn modal-btn-secondary" onclick="closeModal()">Cerrar</button>`;
      } else if (featureName === 'goals') {
        title.textContent = '🎯 Mis Objetivos';
        body.innerHTML = '<p style="text-align:center;color:rgba(10,22,40,0.5);padding:2rem;">Función en desarrollo. Pronto podrás establecer y seguir tus objetivos académicos.</p>';
        footer.innerHTML = `<button class="modal-btn modal-btn-secondary" onclick="closeModal()">Cerrar</button>`;
      } else if (featureName === 'analytics') {
        title.textContent = '📊 Análisis de Progreso';
        body.innerHTML = '<p style="text-align:center;color:rgba(10,22,40,0.5);padding:2rem;">Función en desarrollo. Pronto podrás ver estadísticas de tu progreso académico.</p>';
        footer.innerHTML = `<button class="modal-btn modal-btn-secondary" onclick="closeModal()">Cerrar</button>`;
      }
      
      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('featureModal').classList.remove('active');
    }


    async function generateStudyPlan() {
      const subject = document.getElementById('studySubject').value.trim();
      const weeks = document.getElementById('studyTime').value;
      
      if (!subject) {
        alert('⚠️ Por favor ingresa una materia o tema');
        return;
      }
      
      closeModal();
      
      // Add user message
      const userMessage = `Genera un plan de estudio detallado para: ${subject}, con un tiempo de ${weeks} semana(s)`;
      document.getElementById('chatInput').value = userMessage;
      
      // Send message
      await sendMessage();
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    
    async function init() {
      console.log('🚀 Initializing Tutor...');
      
      // Check authentication
      if (!checkAuth()) return;
      
      // Load user profile
      loadUserProfile();
      
      // Set welcome time
      const welcomeTime = document.getElementById('welcomeTime');
      if (welcomeTime) {
        welcomeTime.textContent = new Date().toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'});
      }
      
      // Load chat history
      await loadChatHistory();
      
      // Focus input
      document.getElementById('chatInput').focus();
      
      console.log('✅ Tutor initialized successfully');
    }

    // Start initialization when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
