<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Tutor IA | Luminom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0A1628;
      --navy-mid: #112240;
      --navy-light: #1C3461;
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --white: #FFFFFF;
      --border-gold: rgba(201,168,76,0.3);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: var(--font-body);
      background: var(--navy);
      color: var(--white);
      display: flex;
      flex-direction: column;
    }
    
    /* === TOPBAR === */
    .topbar {
      height: 60px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      flex-shrink: 0;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    
    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--gold);
      color: var(--navy);

      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
    }
    
    .logo-text {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
    }
    
    .logo-text em {
      font-style: italic;
      color: var(--gold);
    }
    
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .user-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
    }
    
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.55);
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .btn-logout:hover {
      border-color: rgba(255,255,255,0.4);
      color: var(--white);
    }
    
    .btn-home {
      color: rgba(255,255,255,0.45);
      font-size: 0.8rem;
      transition: var(--transition);
      text-decoration: none;
    }
    
    .btn-home:hover {
      color: var(--gold);
    }

    
    /* === LAYOUT === */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    /* === SIDEBAR === */
    .sidebar {
      width: 280px;
      background: rgba(0,0,0,0.22);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    
    .sidebar::-webkit-scrollbar {
      width: 4px;
    }
    
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }
    
    .sidebar-section {
      padding: 1.25rem 1.1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    
    .sidebar-section:last-child {
      border-bottom: none;
    }
    
    .sidebar-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    
    .profile-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .avatar {
      width: 42px;
      height: 42px;
      background: var(--gold);
      color: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    
    .profile-name {
      font-weight: 600;
      font-size: 0.88rem;
    }
    
    .profile-carrera {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      margin-top: 0.1rem;
    }
    
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.5rem;
    }
    
    .tag {
      font-size: 0.68rem;
      background: rgba(201,168,76,0.1);
      border: 1px solid var(--border-gold);
      color: #E8C97A;
      padding: 0.22rem 0.6rem;
      border-radius: 100px;
    }
    
    .stats-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    
    .stat-box {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.5rem;
      text-align: center;
    }
    
    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
    }
    
    .stat-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.45);
      margin-top: 0.2rem;
    }
    
    .new-chat-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--border-gold);
      color: var(--gold-light);
      padding: 0.65rem;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    
    .new-chat-btn:hover {
      background: rgba(201,168,76,0.22);
    }
    
    .quick-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    
    .qbtn {
      text-align: left;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.65);
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      font-size: 0.76rem;
      cursor: pointer;
      transition: var(--transition);
      line-height: 1.4;
    }
    
    .qbtn:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--border-gold);
      color: #E8C97A;
    }
    
    .history-item {
      background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.15));
      border: 3px solid var(--gold);
      padding: 1.2rem 1.1rem;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }
    
    .history-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .history-item:hover::before {
      opacity: 1;
    }
    
    .history-item:hover {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border-color: var(--white);
      transform: translateY(-5px) scale(1.04);
      box-shadow: 0 10px 35px rgba(201,168,76,0.6);
    }
    
    .history-item:active {
      transform: translateY(-3px) scale(1.02);
    }
    
    .history-title {
      font-weight: 700;
      margin-bottom: 0.7rem;
      color: var(--white);
      font-size: 0.96rem;
      line-height: 1.5;
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
      position: relative;
      z-index: 1;
    }
    
    .history-item:hover .history-title {
      color: var(--navy);
      text-shadow: none;
    }
    
    .history-date {
      font-size: 0.80rem;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }
    
    .history-item:hover .history-date {
      color: var(--navy);
    }
    
    .history-date::before {
      content: '🕒';
      font-size: 1rem;
    }
    
    .history-empty {
      text-align: center;
      padding: 4rem 1.5rem;
      color: rgba(255,255,255,0.55);
      font-size: 0.92rem;
      line-height: 1.9;
    }
    
    .history-empty-icon {
      font-size: 5rem;
      margin-bottom: 1.8rem;
      opacity: 0.5;
      animation: floatAnimation 3.5s ease-in-out infinite;
    }
    
    @keyframes floatAnimation {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }
    
    /* === CHAT AREA === */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    
    .ch-avatar {
      width: 36px;
      height: 36px;
      background: var(--gold);
      color: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
    }

    
    .ch-name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .ch-status {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.42);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    
    .ch-dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
    }
    
    /* === MESSAGES === */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    
    .messages::-webkit-scrollbar {
      width: 4px;
    }
    
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }
    
    .msg {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      animation: msgIn 0.3s ease;
    }
    
    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .msg.user {
      flex-direction: row-reverse;
    }
    
    .msg-av {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.82rem;
      flex-shrink: 0;
    }
    
    .msg-av.bot {
      background: var(--gold);
      color: var(--navy);
    }
    
    .msg-av.user {
      background: var(--navy-light);
      color: var(--gold);
    }

    
    .bubble {
      max-width: 75%;
      padding: 0.85rem 1.1rem;
      border-radius: 16px;
      font-size: 0.87rem;
      line-height: 1.68;
    }
    
    .bubble.bot {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      border-bottom-left-radius: 4px;
    }
    
    .bubble.user {
      background: var(--gold);
      color: var(--navy);
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }
    
    .msg-time {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.28);
      margin-top: 0.25rem;
    }
    
    /* === INPUT AREA === */
    .input-area {
      padding: 1.5rem;
      background: rgba(0,0,0,0.22);
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    
    .action-buttons {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    
    .action-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .action-btn:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--border-gold);
      color: var(--gold-light);
    }
    
    .input-wrapper {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    
    .input-wrapper textarea {
      flex: 1;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 0.85rem 1.1rem;
      font-size: 0.92rem;
      color: var(--white);
      background: var(--navy-light);
      resize: none;
      min-height: 48px;
      max-height: 150px;
      font-family: inherit;
      transition: var(--transition);
    }

    
    .input-wrapper textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }
    
    .input-wrapper textarea::placeholder {
      color: rgba(255,255,255,0.35);
    }
    
    .btn-send {
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.5rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }
    
    .btn-send:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }
    
    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    /* === TYPING INDICATOR === */
    .typing {
      display: none;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.1rem;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      width: fit-content;
      margin-left: 2.5rem;
    }
    
    .typing.active {
      display: flex;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    
    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    
    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-8px);
      }
    }
    
    /* === MODAL === */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 22, 40, 0.92);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: var(--white);
      border-radius: 16px;
      max-width: 700px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: modalIn 0.3s ease;
    }
    
    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .modal-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(10, 22, 40, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
    }
    
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(10, 22, 40, 0.08);
      border: none;
      color: var(--navy);
      font-size: 1.2rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-close:hover {
      background: var(--gold);
      color: var(--white);
      transform: rotate(90deg);
    }
    
    .modal-body {
      padding: 2rem;
      overflow-y: auto;
      flex: 1;
    }
    
    .modal-body::-webkit-scrollbar {
      width: 6px;
    }
    
    .modal-body::-webkit-scrollbar-thumb {
      background: rgba(10, 22, 40, 0.2);
      border-radius: 3px;
    }
  </style>
</head>
<body>


  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">L</div>
      <div class="logo-text">Luminom <em>IA</em></div>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="btn-home">← Inicio</a>
      <div class="user-pill">
        <span id="topbarUserName">Usuario</span>
      </div>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    
    <!-- SIDEBAR -->
    <div class="sidebar">
      
      <!-- Profile Section -->
      <div class="sidebar-section">
        <div class="sidebar-label">MI PERFIL</div>
        <div class="profile-row">
          <div class="avatar" id="sidebarAvatar">U</div>
          <div>
            <div class="profile-name" id="sidebarUserName">Usuario</div>
            <div class="profile-carrera" id="sidebarCarrera">Estudiante</div>
          </div>
        </div>
        <div class="tags">
          <span class="tag" id="planBadge">Gratis</span>
        </div>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-value" id="questionCount">0</div>
            <div class="stat-label">Preguntas</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="chatCount">0</div>
            <div class="stat-label">Chats</div>
          </div>
        </div>
      </div>

      <!-- New Chat Button -->
      <div class="sidebar-section">
        <button class="new-chat-btn" onclick="newChat()">
          ➕ Nueva conversación
        </button>
      </div>

      <!-- Quick Actions -->
      <div class="sidebar-section">
        <div class="sidebar-label">ACCIONES RÁPIDAS</div>
        <div class="quick-list">
          <button class="qbtn" onclick="quickAction('plan')">📅 Plan de estudio</button>
          <button class="qbtn" onclick="quickAction('help')">💡 Ayuda con tarea</button>
          <button class="qbtn" onclick="quickAction('explain')">📖 Explicar concepto</button>
          <button class="qbtn" onclick="quickAction('practice')">✍️ Ejercicios prácticos</button>
          <button class="qbtn" onclick="openLibrary()">📚 Mi biblioteca</button>
          <button class="qbtn" onclick="openGoals()">🎯 Mis objetivos</button>
          <button class="qbtn" onclick="openAnalytics()">📊 Mi progreso</button>
        </div>
      </div>

      <!-- History Section - MAXIMIZED AND FUNCTIONAL -->
      <div class="sidebar-section" style="flex:2;display:flex;flex-direction:column;min-height:300px;max-height:none;padding:1.2rem;background:rgba(0,0,0,0.25);border-radius:12px;margin:0.5rem;border:2px solid rgba(201,168,76,0.3);">
        <div style="font-size:0.78rem;font-weight:700;color:var(--gold);margin-bottom:1.2rem;text-transform:uppercase;letter-spacing:0.15em;display:flex;align-items:center;gap:0.5rem;text-shadow:0 2px 8px rgba(201,168,76,0.5);">
          💬 MIS CONVERSACIONES
        </div>
        <div id="historyList" style="flex:1;overflow-y:auto;min-height:0;padding-right:0.5rem;"></div>
      </div>
      
    </div>


    <!-- CHAT AREA -->
    <div class="chat-area">
      
      <!-- Chat Header -->
      <div class="chat-header">
        <div class="ch-avatar">L</div>
        <div>
          <div class="ch-name">Luminom IA</div>
          <div class="ch-status">
            <span class="ch-dot"></span>
            <span>Asistente activo</span>
          </div>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages" id="messages">
        <!-- Welcome message will be added via JavaScript -->
      </div>

      <!-- Typing Indicator -->
      <div class="typing" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="action-buttons">
          <button class="action-btn" onclick="exportToPDF()">
            📄 Exportar PDF
          </button>
          <label class="action-btn" style="cursor:pointer;">
            📎 Subir archivo

    function addMessage(role, content, scroll = true) {

    // ============================================
    // SEND MESSAGE
    // ============================================
    window.sendMessage = async function() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      
      if (!message && !attachedFileText) return;
      
      // Disable input
      input.disabled = true;
      document.getElementById('sendBtn').disabled = true;
      
      // Build full message
      let fullMessage = message;
      if (attachedFileText) {
        fullMessage = `[Archivo adjunto: ${attachedFile.name}]\n\nContenido:\n${attachedFileText.substring(0, 3000)}\n\nPregunta: ${message}`;
      }
      
      // Add user message
      addMessage('user', message || `📎 ${attachedFile.name}`);
      input.value = '';
      
      // Clear file
      if (attachedFile) {
        attachedFile = null;
        attachedFileText = null;
      }
      
      // Show typing
      document.getElementById('typingIndicator').classList.add('active');
      
      // Increment counter
      questionCount++;
      document.getElementById('questionCount').textContent = questionCount;
      localStorage.setItem('luminom_questions_' + currentUser.userId, questionCount.toString());
      
      try {
        // Call API
        const response = await callAPI(fullMessage);
        
        // Hide typing
        document.getElementById('typingIndicator').classList.remove('active');
        
        // Add response
        addMessage('assistant', response);
        
        // Save to Firebase
        await saveToFirebase(message, response);
        
      } catch (error) {
        console.error('❌ Error:', error);
        document.getElementById('typingIndicator').classList.remove('active');
        addMessage('assistant', '❌ Lo siento, hubo un error. Por favor intenta de nuevo.');
      }
      
      // Re-enable input
      input.disabled = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }


    // ============================================
    // API CALL
    // ============================================
    async function callAPI(userMessage) {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            {
              role: 'system',
              content: 'Eres un tutor académico experto y amigable. Ayudas a estudiantes con sus tareas, explicaciones y dudas. Sé claro, didáctico y paciente. Responde en español siempre.'
            },
            {
              role: 'user',
              content: userMessage
            }
          ],
          temperature: 0.7,
          max_tokens: 2048
        })
      });
      
      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }
      
      const data = await response.json();
      return data.choices[0].message.content;
    }

    // ============================================
    // SAVE TO FIREBASE
    // ============================================
    async function saveToFirebase(userMsg, botMsg) {
      if (!currentUser) return;
      
      const timestamp = new Date().toISOString();
      
      try {
        if (currentChatId) {
          // Update existing chat
          const chatRef = db.collection('chats').doc(currentChatId);
          const chatDoc = await chatRef.get();
          const messages = chatDoc.data().messages || [];
          
          messages.push(
            { role: 'user', content: userMsg, timestamp },
            { role: 'assistant', content: botMsg, timestamp }
          );
          
          await chatRef.update({
            messages,
            updatedAt: timestamp
          });
          
        } else {
          // Create new chat
          const title = userMsg.substring(0, 50) + (userMsg.length > 50 ? '...' : '');
          
          const newChat = {
            userId: currentUser.userId,
            title,
            messages: [
              { role: 'user', content: userMsg, timestamp },
              { role: 'assistant', content: botMsg, timestamp }
            ],
            createdAt: timestamp,
            updatedAt: timestamp
          };
          
          const docRef = await db.collection('chats').add(newChat);
          currentChatId = docRef.id;
          
          // Reload history
          await loadHistory();
        }
        
        console.log('✅ Saved to Firebase');
      } catch (error) {
        console.error('❌ Error saving:', error);
      }
    }


    // ============================================
    // LOAD CHAT HISTORY
    // ============================================
    async function loadHistory() {
      if (!currentUser) return;
      
      try {
        const snapshot = await db.collection('chats')
          .where('userId', '==', currentUser.userId)
          .orderBy('updatedAt', 'desc')
          .limit(20)
          .get();
        
        chatHistory = [];
        snapshot.forEach(doc => {
          chatHistory.push({ id: doc.id, ...doc.data() });
        });
        
        // Update UI
        const historyList = document.getElementById('historyList');
        
        if (chatHistory.length === 0) {
          historyList.innerHTML = `
            <div class="history-empty" style="text-align:center;padding:2rem 1rem;color:rgba(255,255,255,0.6);">
              <div class="history-empty-icon" style="font-size:5rem;margin-bottom:1rem;opacity:0.7;animation:float 3s ease-in-out infinite;">💬</div>
              <div style="font-weight:600;font-size:1rem;margin-bottom:0.6rem;color:var(--gold);">Sin conversaciones</div>
              <div style="font-size:0.85rem;opacity:0.85;line-height:1.5;">Tus chats aparecerán aquí cuando inicies una conversación</div>
            </div>
          `;
        } else {
          historyList.innerHTML = chatHistory.map((chat, idx) => {
            const date = new Date(chat.updatedAt);
            const dateStr = date.toLocaleDateString('es-CO', {month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'});
            const title = (chat.title || 'Nueva conversación').substring(0, 50);
            
            return `
              <div class="history-item" data-chat-id="${chat.id}">
                <div class="history-title">${title}</div>
                <div class="history-date">${dateStr}</div>
              </div>
            `;
          }).join('');
          
          // Add click listeners properly
          setTimeout(() => {
            const items = document.querySelectorAll('.history-item');
            console.log('🔵 Adding listeners to', items.length, 'history items');
            items.forEach(item => {
              item.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                const chatId = this.getAttribute('data-chat-id');
                console.log('🔵 History item clicked, chatId:', chatId);
                if (window.loadChat) {
                  window.loadChat(chatId);
                } else {
                  console.error('❌ window.loadChat not found');
                }
              });
            });
            console.log('✅ Click listeners attached to all history items');
          }, 100);
        }
        
        document.getElementById('chatCount').textContent = chatHistory.length;
        
        console.log(`✅ Loaded ${chatHistory.length} chats`);
      } catch (error) {
        console.error('❌ Error loading history:', error);
      }
    }

    // ============================================
    // EXPORT TO PDF
    // ============================================
    window.exportToPDF = function() {
      const messages = Array.from(document.querySelectorAll('.msg'));
      
      if (messages.length === 0) {
        alert('⚠️ No hay mensajes para exportar');
        return;
      }
      
      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Header
        doc.setFontSize(20);
        doc.text('Chat - Luminom IA', 20, 20);
        
        doc.setFontSize(10);
        doc.text(`Usuario: ${currentUser.name || currentUser.email}`, 20, 30);
        doc.text(`Fecha: ${new Date().toLocaleDateString('es-CO')}`, 20, 35);
        
        let yPos = 45;
        
        messages.forEach((msg) => {
          const isUser = msg.classList.contains('user');
          const bubble = msg.querySelector('.bubble');
          const text = bubble.textContent.trim();
          
          if (yPos > 270) {
            doc.addPage();
            yPos = 20;
          }
          
          doc.setFont(undefined, 'bold');
          doc.text(isUser ? '👤 Tú' : '🤖 IA', 20, yPos);
          yPos += 5;
          
          doc.setFont(undefined, 'normal');
          const lines = doc.splitTextToSize(text, 170);
          doc.text(lines, 20, yPos);
          
          yPos += (lines.length * 5) + 5;
        });
        
        doc.save(`chat-luminom-${new Date().toISOString().split('T')[0]}.pdf`);
        alert('✅ Chat exportado a PDF exitosamente');
      } catch (error) {
        console.error('Error al exportar PDF:', error);
        alert('⚠️ Error al exportar PDF');
      }
    }

    // ============================================
    // FILE UPLOAD
    // ============================================
    window.handleFileUpload = async function(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      attachedFile = file;
      
      // If PDF, extract text
      if (file.type === 'application/pdf') {
        try {
          alert('📄 Extrayendo texto del PDF...');
          
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
          let fullText = '';
          
          for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            const pageText = textContent.items.map(item => item.str).join(' ');
            fullText += pageText + '\n\n';
          }
          
          attachedFileText = fullText;
          alert('✅ Texto extraído del PDF. Ahora escribe tu pregunta sobre el documento.');
          console.log('✅ PDF text extracted');
        } catch (error) {
          console.error('❌ Error extracting PDF:', error);
          alert('⚠️ Error al extraer texto del PDF');
        }
      } else if (file.type.startsWith('image/')) {
        alert('📸 Imagen cargada. Escribe tu pregunta sobre la imagen.');
      }
      
      // Focus input
      document.getElementById('chatInput').focus();
    }


    // ============================================
    // VOICE RECOGNITION
    // ============================================
    window.toggleVoice = function() {
      if (!isRecording) {
        startVoice();
      } else {
        stopVoice();
      }
    }
    
    function startVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('⚠️ Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.');
        return;
      }
      
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'es-ES';
      recognition.continuous = false;
      recognition.interimResults = false;
      
      recognition.onstart = () => {
        isRecording = true;
        document.getElementById('voiceBtn').style.background = 'linear-gradient(135deg,#ef4444,#dc2626)';
        document.getElementById('voiceBtn').style.color = 'white';
        console.log('🎤 Recording...');
      };
      
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('chatInput').value = transcript;
        stopVoice();
      };
      
      recognition.onerror = (event) => {
        console.error('🎤 Error:', event.error);
        stopVoice();
      };
      
      recognition.onend = () => {
        stopVoice();
      };
      
      recognition.start();
    }
    
    function stopVoice() {
      if (recognition) {
        recognition.stop();
      }
      isRecording = false;
      document.getElementById('voiceBtn').style.background = '';
      document.getElementById('voiceBtn').style.color = '';
    }

                <p style="font-size:0.88rem;color:rgba(10,22,40,0.75);line-height:1.6;margin-bottom:0.75rem;">${r.content.substring(0, 200)}${r.content.length > 200 ? '...' : ''}</p>

    window.saveToLibrary = function(content) {
      const title = prompt('📚 Título para este recurso:', 'Recurso de estudio');
      if (!title) return;
      
      const stored = localStorage.getItem('luminom_library_' + currentUser.userId);
      const savedResources = stored ? JSON.parse(stored) : [];
      
      const resource = {
        id: Date.now().toString(),
        title,
        content,
        savedAt: new Date().toISOString()
      };
      
      savedResources.push(resource);
      localStorage.setItem('luminom_library_' + currentUser.userId, JSON.stringify(savedResources));
      
      alert('✅ Recurso guardado en tu biblioteca');
    };
    
    window.deleteResource = function(id) {
      if (!confirm('¿Eliminar este recurso?')) return;
      
      const stored = localStorage.getItem('luminom_library_' + currentUser.userId);
      let savedResources = stored ? JSON.parse(stored) : [];
      
      savedResources = savedResources.filter(r => r.id !== id);
      localStorage.setItem('luminom_library_' + currentUser.userId, JSON.stringify(savedResources));
      
      openLibrary();
    };

      const resource = savedResources.find(r => r.id === id);
      
      if (!resource) return;
      
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `
        <div class="modal-content">
          <div class="modal-header">
            <div class="modal-title">${resource.title}</div>

          <div class="modal-body">
            <div style="line-height:1.8;white-space:pre-wrap;padding:1rem;background:rgba(201,168,76,0.05);border-radius:8px;">${resource.content}</div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    // ============================================
    // GOALS SYSTEM
    // ============================================
    window.openGoals = function() {
      const stored = localStorage.getItem('luminom_goals_' + currentUser.userId);
      const goals = stored ? JSON.parse(stored) : [];
      
      const modal = document.getElementById('featureModal');
      const title = document.getElementById('modalTitle');
      const body = document.getElementById('modalBody');
      
      const completedCount = goals.filter(g => g.completed).length;
      title.textContent = `🎯 Mis Objetivos (${completedCount}/${goals.length})`;
      
      if (goals.length === 0) {
        body.innerHTML = `
          <div style="text-align:center;padding:3rem;color:rgba(10,22,40,0.5);">
            <div style="font-size:4rem;margin-bottom:1rem;">🎯</div>
            <h3 style="margin-bottom:0.5rem;">No tienes objetivos definidos</h3>
            <p style="font-size:0.9rem;">Establece metas académicas y haz seguimiento de tu progreso</p>
            <button onclick="addGoal()" style="margin-top:2rem;padding:0.75rem 1.5rem;background:var(--gold);color:var(--navy);border:none;border-radius:100px;font-size:0.9rem;font-weight:600;cursor:pointer;">➕ Crear mi primer objetivo</button>
          </div>
        `;
      } else {
        body.innerHTML = `
          <div style="max-height:500px;overflow-y:auto;">
            ${goals.map(g => `
              <div style="background:${g.completed ? 'rgba(16,185,129,0.08)' : 'rgba(201,168,76,0.08)'};padding:1.25rem;border-radius:12px;margin-bottom:1rem;border-left:4px solid ${g.completed ? '#10b981' : 'var(--gold)'};">
                <div style="display:flex;justify-content:space-between;align-items:start;">
                  <div style="flex:1;">
                    <h4 style="color:var(--navy);font-size:1rem;font-weight:600;margin-bottom:0.5rem;">${g.title}</h4>
                    <p style="font-size:0.85rem;color:rgba(10,22,40,0.7);margin-bottom:0.75rem;">${g.description || 'Sin descripción'}</p>
                    <div style="font-size:0.75rem;color:rgba(10,22,40,0.5);">
                      ${g.completed ? `✅ Completado el ${new Date(g.completedAt).toLocaleDateString('es-CO')}` : '⏳ En progreso'}
                    </div>
                  </div>
                  <button onclick="deleteGoal('${g.id}')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:1.1rem;padding:0.25rem;margin-left:0.5rem;" title="Eliminar">🗑️</button>
                </div>
                ${!g.completed ? `
                  <button onclick="completeGoal('${g.id}')" style="margin-top:0.75rem;padding:0.5rem 1rem;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;">✓ Marcar como completado</button>
                ` : ''}
              </div>
            `).join('')}
            <button onclick="addGoal()" style="width:100%;padding:0.75rem;background:rgba(201,168,76,0.15);color:var(--navy);border:1px dashed var(--gold);border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;margin-top:1rem;">➕ Agregar nuevo objetivo</button>
          </div>
        `;
      }
      
      modal.classList.add('active');
    };
    
    window.addGoal = function() {
      const title = prompt('🎯 Título del objetivo (ej: "Aprobar Cálculo con 4.5"):');
      if (!title) return;
      
      const description = prompt('📝 Descripción (opcional):') || '';
      
      const stored = localStorage.getItem('luminom_goals_' + currentUser.userId);
      const goals = stored ? JSON.parse(stored) : [];
      
      goals.push({
        id: Date.now().toString(),
        title,
        description,
        completed: false,
        createdAt: new Date().toISOString()
      });
      
      localStorage.setItem('luminom_goals_' + currentUser.userId, JSON.stringify(goals));
      openGoals();
    };
    
    window.completeGoal = function(id) {
      const stored = localStorage.getItem('luminom_goals_' + currentUser.userId);
      const goals = stored ? JSON.parse(stored) : [];
      
      const goal = goals.find(g => g.id === id);
      if (goal) {
        goal.completed = true;
        goal.completedAt = new Date().toISOString();
        localStorage.setItem('luminom_goals_' + currentUser.userId, JSON.stringify(goals));
        openGoals();
        alert('🎉 ¡Felicitaciones! Objetivo completado');
      }
    };
    
    window.deleteGoal = function(id) {
      if (!confirm('¿Eliminar este objetivo?')) return;
      
      const stored = localStorage.getItem('luminom_goals_' + currentUser.userId);
      let goals = stored ? JSON.parse(stored) : [];
      
      goals = goals.filter(g => g.id !== id);
      localStorage.setItem('luminom_goals_' + currentUser.userId, JSON.stringify(goals));
      
      openGoals();
    };

    // ============================================
    // ANALYTICS SYSTEM
    // ============================================
    window.openAnalytics = function() {
      const modal = document.getElementById('featureModal');
      const title = document.getElementById('modalTitle');
      const body = document.getElementById('modalBody');
      
      title.textContent = '📊 Mi Progreso';
      
      const totalQuestions = questionCount;
      const totalChats = chatHistory.length;
      
      const libraryStored = localStorage.getItem('luminom_library_' + currentUser.userId);
      const librarySize = libraryStored ? JSON.parse(libraryStored).length : 0;
      
      const goalsStored = localStorage.getItem('luminom_goals_' + currentUser.userId);
      const goals = goalsStored ? JSON.parse(goalsStored) : [];
      const completedGoals = goals.filter(g => g.completed).length;
      
      const streak = parseInt(localStorage.getItem('luminom_streak_' + currentUser.userId) || '0');
      
      body.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:2rem;">
          <div style="background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;padding:2rem;border-radius:16px;text-align:center;">
            <div style="font-size:3rem;font-weight:700;margin-bottom:0.5rem;">${totalQuestions}</div>
            <div style="font-size:0.9rem;opacity:0.9;">Preguntas realizadas</div>
          </div>
          <div style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white;padding:2rem;border-radius:16px;text-align:center;">
            <div style="font-size:3rem;font-weight:700;margin-bottom:0.5rem;">${totalChats}</div>
            <div style="font-size:0.9rem;opacity:0.9;">Conversaciones</div>
          </div>
          <div style="background:linear-gradient(135deg,#f59e0b,#d97706);color:white;padding:2rem;border-radius:16px;text-align:center;">
            <div style="font-size:3rem;font-weight:700;margin-bottom:0.5rem;">${librarySize}</div>
            <div style="font-size:0.9rem;opacity:0.9;">Recursos guardados</div>
          </div>
          <div style="background:linear-gradient(135deg,#10b981,#059669);color:white;padding:2rem;border-radius:16px;text-align:center;">
            <div style="font-size:3rem;font-weight:700;margin-bottom:0.5rem;">${completedGoals}/${goals.length}</div>
            <div style="font-size:0.9rem;opacity:0.9;">Objetivos logrados</div>
          </div>
        </div>
        
        <div style="background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));padding:2rem;border-radius:16px;text-align:center;border:2px solid var(--gold);">
          <div style="font-size:3rem;margin-bottom:0.75rem;">🔥</div>
          <div style="font-size:2.5rem;font-weight:700;color:var(--navy);margin-bottom:0.5rem;">${streak} días</div>
          <div style="font-size:1rem;color:rgba(10,22,40,0.7);">Racha de estudio consecutiva</div>
          <p style="font-size:0.85rem;color:rgba(10,22,40,0.5);margin-top:1rem;">¡Sigue así! La consistencia es clave para el aprendizaje</p>
        </div>
        
        <div style="margin-top:2rem;padding:1.5rem;background:rgba(59,130,246,0.08);border-left:4px solid #3b82f6;border-radius:8px;">
          <strong style="color:var(--navy);font-size:1rem;">💡 Consejo del día:</strong>
          <p style="font-size:0.9rem;color:rgba(10,22,40,0.75);margin-top:0.75rem;line-height:1.7;">
            ${getTip()}
          </p>
        </div>
      `;
      
      modal.classList.add('active');
    };
    
    function getTip() {
      const tips = [
        'Estudia en sesiones de 25 minutos con descansos de 5 minutos (técnica Pomodoro). Tu cerebro retiene mejor la información con descansos regulares.',
        'Enseñarle a alguien más lo que aprendiste es una de las mejores formas de afianzar tu conocimiento. Explica conceptos en voz alta.',
        'Toma notas a mano en lugar de digital. Estudios muestran que escribir a mano mejora significativamente la retención de información.',
        'Establece objetivos específicos y medibles para cada sesión de estudio. Por ejemplo: "Completar 10 ejercicios de álgebra" en lugar de "estudiar matemáticas".',
        'Estudia en el mismo lugar y hora para crear un hábito. Tu cerebro asociará ese espacio con el enfoque y el aprendizaje.',
        'Haz ejercicio antes de estudiar. La actividad física aumenta el flujo sanguíneo al cerebro, mejorando la concentración y memoria.',
        'Duerme bien. El sueño consolida la memoria y el aprendizaje. Un cerebro descansado aprende hasta 40% más eficientemente.',
        'Usa mapas mentales para conectar conceptos. La visualización de relaciones entre ideas mejora la comprensión y memoria a largo plazo.'
      ];
      return tips[Math.floor(Math.random() * tips.length)];
    }
    
    window.closeModal = function() {
      const modal = document.getElementById('featureModal');
      if (modal) {
        modal.classList.remove('active');
      }
      // Remove any dynamically created modals
      document.querySelectorAll('.modal.active').forEach(m => m.remove());
    };

    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() {
      console.log('🚀 Initializing Luminom IA Tutor...');
      
      // Check authentication
      if (!checkAuth()) return;
      
      // Load profile
      loadUserProfile();
      
      // Load history
      await loadHistory();
      
      // Add welcome message
      addMessage('assistant', '¡Hola! Soy tu tutor con IA. Estoy aquí para ayudarte con tus tareas y dudas académicas. ¿En qué puedo ayudarte?');
      
      // Focus input
      document.getElementById('chatInput').focus();
      
      console.log('✅ Tutor initialized successfully');
    }

    // Start when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

</body>
</html>
