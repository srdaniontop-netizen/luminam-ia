<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chat - Luminom IA</title>
  <style>
    :root{--navy:#0A1628;--gold:#C9A84C;--white:#FFF;--bg:#0F1419;--card:#1A1F2E;--text:#E5E7EB;--textMuted:#9CA3AF;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;}
    
    .header{background:var(--card);padding:1rem 2rem;border-bottom:1px solid rgba(201,168,76,0.2);display:flex;justify-content:space-between;align-items:center;}
    .logo{font-size:1.5rem;font-weight:700;color:var(--gold);}
    .info{font-size:0.9rem;color:var(--textMuted);}
    
    .chat-container{flex:1;display:flex;flex-direction:column;max-width:900px;width:100%;margin:0 auto;padding:1rem;overflow:hidden;}
    .messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:1rem;}
    .message{display:flex;gap:0.8rem;align-items:flex-start;}
    .message.user{flex-direction:row-reverse;}
    .avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
    .message.user .avatar{background:var(--navy);color:var(--gold);border:2px solid var(--gold);}
    .bubble{background:var(--card);padding:1rem;border-radius:12px;max-width:70%;border:1px solid rgba(255,255,255,0.1);}
    .message.user .bubble{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);}
    
    .input-area{padding:1.5rem;background:var(--card);border-top:1px solid rgba(201,168,76,0.2);}
    .input-wrapper{display:flex;gap:1rem;max-width:900px;margin:0 auto;}
    .input-wrapper textarea{flex:1;background:var(--bg);border:1px solid rgba(201,168,76,0.3);border-radius:10px;padding:1rem;color:var(--text);font-size:1rem;resize:none;font-family:inherit;min-height:60px;}
    .input-wrapper textarea:focus{outline:none;border-color:var(--gold);}
    .btn-send{background:var(--gold);color:var(--navy);border:none;padding:0 2rem;border-radius:10px;font-weight:600;cursor:pointer;transition:transform 0.2s;}
    .btn-send:hover:not(:disabled){transform:translateY(-2px);}
    .btn-send:disabled{opacity:0.5;cursor:not-allowed;}
    
    .typing{color:var(--textMuted);font-size:0.9rem;font-style:italic;}
    .welcome{text-align:center;padding:3rem 2rem;color:var(--textMuted);}
    .welcome h2{color:var(--gold);margin-bottom:1rem;}
    .quick-btns{display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin-top:1.5rem;}
    .quick-btn{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:var(--text);padding:0.6rem 1rem;border-radius:8px;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}
    .quick-btn:hover{background:rgba(201,168,76,0.2);transform:translateY(-1px);}
    
    .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);padding:1rem;border-radius:8px;margin:1rem;color:#EF4444;}
    
    code{background:rgba(255,255,255,0.05);padding:0.2rem 0.4rem;border-radius:4px;font-family:'Courier New',monospace;font-size:0.9em;}
    pre{background:rgba(255,255,255,0.05);padding:1rem;border-radius:8px;overflow-x:auto;margin:0.5rem 0;}
    pre code{background:none;padding:0;}
    strong{color:var(--gold);}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦ Luminom IA</div>
    <div class="info">Tutor Gratuito</div>
  </div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h2>¡Hola! 👋</h2>
        <p>Soy tu tutor universitario con IA. Puedo ayudarte con cualquier materia:</p>
        <div class="quick-btns">
          <button class="quick-btn" onclick="sendQuick('Explícame qué es una derivada con un ejemplo')">📐 Matemáticas</button>
          <button class="quick-btn" onclick="sendQuick('¿Cómo funciona un bucle for en Python?')">💻 Programación</button>
          <button class="quick-btn" onclick="sendQuick('¿Qué es la Segunda Ley de Newton?')">⚛️ Física</button>
          <button class="quick-btn" onclick="sendQuick('Explica la oferta y demanda en economía')">💰 Economía</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea 
          id="userInput" 
          placeholder="Escribe tu pregunta aquí..." 
          onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"
        ></textarea>
        <button class="btn-send" onclick="sendMessage()" id="sendBtn">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    // Configuración de la API gratuita de Hugging Face
    const API_URL = 'https://api-inference.huggingface.co/models/meta-llama/Llama-3.2-3B-Instruct';
    const API_KEY = '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'; // API Key gratuita de demo

    let conversationHistory = [];
    let messageCount = 0;

    function hideWelcome() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';
    }

    function addMessage(content, isUser) {
      hideWelcome();
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = isUser ? 'T' : 'L';
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessage(content);
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function formatMessage(text) {
      // Bloques de código
      text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, lang, code) => 
        `<pre><code>${escapeHtml(code.trim())}</code></pre>`
      );
      // Código inline
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Negritas
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Saltos de línea
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[m]));
    }

    function showTyping() {
      hideWelcome();
      const messagesDiv = document.getElementById('messages');
      const typingDiv = document.createElement('div');
      typingDiv.id = 'typing';
      typingDiv.className = 'message bot';
      typingDiv.innerHTML = `
        <div class="avatar">L</div>
        <div class="bubble typing">Escribiendo...</div>
      `;
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function callHuggingFaceAPI(userMessage) {
      const systemPrompt = `Eres Luminom IA, un tutor universitario para estudiantes colombianos. 

Tu misión: ayudar a entender cualquier tema académico de forma clara y práctica.

CÓMO RESPONDER:
- Siempre en español
- Tono cercano y motivador
- Explicaciones claras y paso a paso
- Usa ejemplos del contexto colombiano cuando sea relevante
- Para matemáticas: muestra los pasos numerados
- Para código: usa bloques de código bien formateados
- Máximo 3-4 párrafos por respuesta

NUNCA inventes datos o teoremas que no existen.`;

      const messages = [
        { role: 'system', content: systemPrompt },
        ...conversationHistory,
        { role: 'user', content: userMessage }
      ];

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            inputs: messages.map(m => `${m.role}: ${m.content}`).join('\n\n'),
            parameters: {
              max_new_tokens: 1000,
              temperature: 0.7,
              top_p: 0.95,
              return_full_text: false
            }
          })
        });

        if (!response.ok) {
          throw new Error(`Error ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        
        if (data.error) {
          throw new Error(data.error);
        }

        let aiResponse = data[0]?.generated_text || data.generated_text || 'No pude generar una respuesta. Intenta de nuevo.';
        
        // Limpiar la respuesta si viene con el prompt incluido
        aiResponse = aiResponse.split('assistant:').pop().trim();
        
        return aiResponse;
      } catch (error) {
        console.error('Error llamando a Hugging Face:', error);
        return `⚠️ Hubo un problema conectando con la IA. 

**Posibles causas:**
- La API gratuita tiene un límite de uso
- El modelo está cargando (intenta en 20 segundos)

**Mientras tanto:**
- Intenta reformular tu pregunta más corta
- Espera unos segundos y vuelve a intentar

Error: ${error.message}`;
      }
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      input.value = '';
      input.style.height = 'auto';
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      
      addMessage(message, true);
      conversationHistory.push({ role: 'user', content: message });
      
      showTyping();
      
      const aiResponse = await callHuggingFaceAPI(message);
      
      hideTyping();
      addMessage(aiResponse, false);
      
      conversationHistory.push({ role: 'assistant', content: aiResponse });
      
      // Mantener solo últimos 10 mensajes para no exceder límites
      if (conversationHistory.length > 20) {
        conversationHistory = conversationHistory.slice(-20);
      }
      
      sendBtn.disabled = false;
      input.focus();
    }

    function sendQuick(question) {
      document.getElementById('userInput').value = question;
      sendMessage();
    }

    // Focus en input al cargar
    document.getElementById('userInput').focus();
  </script>
</body>
</html>
