<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Iniciar Sesión | Luminom IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:#0A1628; --navy-mid:#112240; --navy-light:#1C3461;
      --gold:#C9A84C; --gold-light:#E8C97A;
      --white:#FFFFFF; --off-white:#F8F6F1;
      --text-primary:#0A1628; --text-secondary:#4A5568;
      --border:rgba(10,22,40,0.1); --border-gold:rgba(201,168,76,0.3);
      --shadow-sm:0 2px 12px rgba(10,22,40,0.08);
      --shadow-md:0 8px 32px rgba(10,22,40,0.14);
      --radius-sm:8px; --radius-md:14px; --radius-lg:22px;
      --font-display:'Playfair Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --t:0.28s cubic-bezier(0.4,0,0.2,1);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font-body);background:var(--navy);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    
    .auth-wrap{width:100%;max-width:460px;}
    .logo-section{text-align:center;margin-bottom:2.5rem;}
    .logo-mark{width:60px;height:60px;background:var(--gold);color:var(--navy);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:2rem;margin-bottom:1rem;}
    .logo-text{font-family:var(--font-display);font-size:1.6rem;font-weight:600;color:var(--white);}
    .logo-text em{color:var(--gold);font-style:italic;}

    .tabs{display:flex;gap:0;background:rgba(255,255,255,0.05);border-radius:var(--radius-md);padding:0.3rem;margin-bottom:2rem;}
    .tab{flex:1;padding:0.7rem;background:transparent;border:none;color:rgba(255,255,255,0.5);font-weight:600;font-size:0.9rem;cursor:pointer;transition:var(--t);border-radius:var(--radius-sm);}
    .tab.active{background:var(--gold);color:var(--navy);}

    .form-container{display:none;background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-lg);padding:2.5rem;}
    .form-container.active{display:block;animation:fadeIn 0.4s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    .form-field{margin-bottom:1.2rem;}
    .form-field label{display:block;font-size:0.84rem;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:0.4rem;}
    .form-field input,.form-field select{width:100%;border:1.5px solid rgba(255,255,255,0.15);border-radius:var(--radius-sm);padding:0.85rem 1.1rem;font-size:0.92rem;color:var(--white);background:rgba(0,0,0,0.2);outline:none;transition:var(--t);}
    .form-field input:focus,.form-field select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.15);}
    .form-field input::placeholder{color:rgba(255,255,255,0.3);}
    .field-error{display:block;font-size:0.75rem;color:#ff6b6b;margin-top:0.35rem;min-height:0.9rem;}

    .btn-submit{width:100%;background:var(--gold);color:var(--navy);padding:1rem;border-radius:100px;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:var(--t);margin-top:0.5rem;}
    .btn-submit:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,0.4);}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

    .divider{text-align:center;margin:1.8rem 0;position:relative;color:rgba(255,255,255,0.4);font-size:0.85rem;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:rgba(255,255,255,0.1);}
    .divider::before{left:0;}.divider::after{right:0;}

    .footer-link{text-align:center;margin-top:1.5rem;font-size:0.86rem;color:rgba(255,255,255,0.5);}
    .footer-link a{color:var(--gold);font-weight:600;text-decoration:none;}
    .footer-link a:hover{text-decoration:underline;}

    .back-btn{display:inline-flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.6);font-size:0.85rem;text-decoration:none;margin-bottom:1.5rem;transition:var(--t);}
    .back-btn:hover{color:var(--gold);}
  </style>
</head>
<body>


  <div class="auth-wrap">
    <a href="index.html" class="back-btn">← Volver al inicio</a>
    
    <div class="logo-section">
      <div class="logo-mark">L</div>
      <div class="logo-text">Luminom <em>IA</em></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Iniciar Sesión</button>
      <button class="tab" onclick="showTab('register')">Registrarse</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="form-container active">
      <form onsubmit="handleLogin(event)">
        <div class="form-field">
          <label for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" placeholder="tu@email.com" required/>
          <span class="field-error" id="loginEmailError"></span>
        </div>

        <div class="form-field">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required/>
          <span class="field-error" id="loginPasswordError"></span>
        </div>

        <button type="submit" class="btn-submit">Entrar</button>
      </form>

      <div class="divider">o continúa con</div>

      <div class="footer-link">
        <p>¿Olvidaste tu contraseña? <a href="#">Recupérala aquí</a></p>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="form-container">
      <form onsubmit="handleRegister(event)">
        <div class="form-field">
          <label for="registerName">Nombre completo</label>
          <input type="text" id="registerName" placeholder="Juan Pérez" required/>
          <span class="field-error" id="registerNameError"></span>
        </div>

        <div class="form-field">
          <label for="registerEmail">Correo electrónico</label>
          <input type="email" id="registerEmail" placeholder="tu@email.com" required/>
          <span class="field-error" id="registerEmailError"></span>
        </div>

        <div class="form-field">
          <label for="registerCarrera">Carrera</label>
          <select id="registerCarrera" required>
            <option value="">Selecciona tu carrera</option>
            <option value="Ingeniería de Sistemas">Ingeniería de Sistemas</option>
            <option value="Ingeniería Industrial">Ingeniería Industrial</option>
            <option value="Ingeniería Civil">Ingeniería Civil</option>
            <option value="Medicina">Medicina</option>
            <option value="Derecho">Derecho</option>
            <option value="Administración de Empresas">Administración de Empresas</option>
            <option value="Economía">Economía</option>
            <option value="Psicología">Psicología</option>
            <option value="Diseño Gráfico">Diseño Gráfico</option>
            <option value="Arquitectura">Arquitectura</option>
            <option value="Otra">Otra</option>
          </select>
          <span class="field-error" id="registerCarreraError"></span>
        </div>

        <div class="form-field">
          <label for="registerPassword">Contraseña</label>
          <input type="password" id="registerPassword" placeholder="••••••••" minlength="6" required/>
          <span class="field-error" id="registerPasswordError"></span>
        </div>

        <div class="form-field">
          <label for="registerConfirmPassword">Confirmar contraseña</label>
          <input type="password" id="registerConfirmPassword" placeholder="••••••••" required/>
          <span class="field-error" id="registerConfirmError"></span>
        </div>

        <button type="submit" class="btn-submit">Crear cuenta</button>
      </form>

      <div class="divider">o regístrate con</div>

      <div class="footer-link">
        <p>¿Ya tienes cuenta? <a href="#" onclick="event.preventDefault();showTab('login')">Inicia sesión</a></p>
      </div>
    </div>
  </div>


  <script>
    const Auth = {
      register(name, email, password, carrera) {
        const users = this.getUsers();
        if (users.find(u => u.email === email))
          return { ok: false, error: 'Este correo ya está registrado.' };
        const user = { id: Date.now().toString(), name, email, password, carrera, createdAt: new Date().toISOString() };
        users.push(user);
        localStorage.setItem('luminom_users', JSON.stringify(users));
        return { ok: true, user };
      },
      login(email, password) {
        const users = this.getUsers();
        const user = users.find(u => u.email === email && u.password === password);
        if (!user) return { ok: false, error: 'Correo o contraseña incorrectos.' };
        const session = { userId: user.id, name: user.name, email: user.email, carrera: user.carrera };
        localStorage.setItem('luminom_session', JSON.stringify(session));
        return { ok: true, user: session };
      },
      logout() { localStorage.removeItem('luminom_session'); window.location.href = 'index.html'; },
      getSession() { try { return JSON.parse(localStorage.getItem('luminom_session')); } catch { return null; } },
      getUsers() { try { return JSON.parse(localStorage.getItem('luminom_users') || '[]'); } catch { return []; } },
      requireAuth() {
        if (!this.getSession()) { window.location.href = 'login.html?next=tutor'; return false; }
        return true;
      },
      redirectIfLogged() { if (this.getSession()) window.location.href = 'tutor.html'; }
    };

    // Redirigir si ya está logueado
    if (Auth.getSession()) {
      const urlParams = new URLSearchParams(window.location.search);
      const next = urlParams.get('next') || 'tutor';
      window.location.href = next + '.html';
    }

    // Detectar tab inicial
    const urlParams = new URLSearchParams(window.location.search);
    const tab = urlParams.get('tab');
    if (tab === 'register') {
      document.querySelector('.tab.active').classList.remove('active');
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('registerForm').classList.add('active');
    }

    function showTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
      document.getElementById(tabName + 'Form').classList.add('active');
      
      document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
    }

    function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
      
      if (!email.includes('@')) {
        document.getElementById('loginEmailError').textContent = 'Email inválido';
        return;
      }
      
      const result = Auth.login(email, password);
      
      if (!result.ok) {
        document.getElementById('loginPasswordError').textContent = result.error;
        return;
      }
      
      const urlParams = new URLSearchParams(window.location.search);
      const next = urlParams.get('next') || 'tutor';
      window.location.href = next + '.html';
    }

    function handleRegister(event) {
      event.preventDefault();
      
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const carrera = document.getElementById('registerCarrera').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;
      
      document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
      
      if (name.length < 3) {
        document.getElementById('registerNameError').textContent = 'Nombre muy corto';
        return;
      }
      
      if (!email.includes('@')) {
        document.getElementById('registerEmailError').textContent = 'Email inválido';
        return;
      }
      
      if (!carrera) {
        document.getElementById('registerCarreraError').textContent = 'Selecciona tu carrera';
        return;
      }
      
      if (password.length < 6) {
        document.getElementById('registerPasswordError').textContent = 'Mínimo 6 caracteres';
        return;
      }
      
      if (password !== confirmPassword) {
        document.getElementById('registerConfirmError').textContent = 'Las contraseñas no coinciden';
        return;
      }
      
      const result = Auth.register(name, email, password, carrera);
      
      if (!result.ok) {
        document.getElementById('registerEmailError').textContent = result.error;
        return;
      }
      
      Auth.login(email, password);
      window.location.href = 'tutor.html';
    }
  </script>
</body>
</html>
